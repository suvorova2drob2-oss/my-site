<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Hunt — Going vegan (reading)</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --ok: #10b981;
      --err: #f43f5e;
      --speaker: #f87171;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back { color: var(--primary); text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .lead { font-size: 0.9rem; color: var(--muted); margin-bottom: 14px; }
    .chain { font-size: 0.82rem; color: var(--primary); margin-bottom: 16px; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .progress-bar { flex: 1; height: 8px; background: #334155; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--ok); border-radius: 999px; transition: width 0.25s ease; }
    .paraphrase-wrap {
      border: 1px solid var(--primary);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
      background: rgba(56, 189, 248, 0.06);
    }
    .paraphrase-label {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .paraphrase-text { font-size: 1.1rem; font-weight: 600; font-style: italic; }
    .passage-card {
      border-left: 4px solid var(--primary);
      padding: 16px 16px 16px 18px;
      background: var(--panel);
      border-radius: 0 12px 12px 0;
      border: 1px solid var(--border);
      border-left-width: 4px;
    }
    .speaker-tag { color: var(--speaker); font-weight: 800; margin-bottom: 12px; }
    .passage { font-size: 1rem; color: #e2e8f0; line-height: 1.65; }
    .pick {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
      color: #bae6fd;
    }
    .pick:hover:not(.done):not(.disabled) { background: rgba(56, 189, 248, 0.15); }
    .pick.done { color: var(--ok); text-decoration: none; cursor: default; }
    .pick.wrong-flash { animation: shake 0.4s ease; color: var(--err); }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    .nav-rounds { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .nav-rounds button {
      border: 1px solid #475569;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-rounds button:disabled { opacity: 0.45; cursor: not-allowed; }
    .all-done { display: none; margin-top: 14px; padding: 12px; border-radius: 10px; background: rgba(16, 185, 129, 0.15); color: #a7f3d0; font-weight: 600; }
    .all-done.show { display: block; }
    .score-line { font-size: 0.95rem; color: var(--muted); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <h1>Treasure Hunt — Going vegan</h1>
      <a class="back" href="index.html">← Back to hub</a>
    </div>
    <p class="lead">Read the paraphrase, then click the <strong>exact phrase</strong> in the passage. Only the next phrase in the list scores a point; wrong taps flash red.</p>
    <p class="chain" id="chainNote"></p>
    <p class="score-line">Home score (shared): <strong id="totalScore">0</strong></p>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span id="itemCounter" style="font-size:0.88rem;color:var(--muted)"></span>
    </div>
    <div class="paraphrase-wrap">
      <span class="paraphrase-label">Paraphrase</span>
      <p class="paraphrase-text" id="paraphraseBox"></p>
    </div>
    <div class="passage-card">
      <div class="speaker-tag" id="speakerLabel"></div>
      <div class="passage" id="passageBox"></div>
    </div>
    <div class="nav-rounds">
      <button type="button" id="btnPrevRound">← Prev round</button>
      <button type="button" id="btnNextRound">Next round →</button>
    </div>
    <p class="all-done" id="allDone">All rounds complete — switch back to the hub or shuffle the Sticky Board.</p>
  </div>
  <script>
    var scoreKey = "masteringB2Score";
    function getScore() {
      var n = Number(localStorage.getItem(scoreKey));
      return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
    }
    function addScore(x) {
      localStorage.setItem(scoreKey, String(getScore() + x));
    }

    var ROUNDS = [
      {
        short: "Jack",
        title: "Going vegan — Jack (A)",
        passage:
          "I first wanted to go vegan a few years ago, when I was about thirteen, and learnt about the effects of the meat industry on the environment. But my mum told me to wait until I was older and better informed about what being vegan meant. It was probably sound advice, though I now know it was partly because she couldn't face cooking special meals for me. I totally get that, though, and don't hold it against her. Now that I am a vegan, I'm very much aware of the extra effort involved for non-vegans who invite me round for a meal. I always offer to take a dessert, and the other dinner guests are invariably amazed at how delicious it is.",
        items: [
          { phrase: "sound advice", paraphrase: "Sensible guidance about waiting until you know more." },
          { phrase: "hold it against her", paraphrase: "Stay angry with your mum for saying no back then." },
          { phrase: "invite me round for a meal", paraphrase: "Ask a vegan over for dinner (extra work for hosts)." },
          { phrase: "extra effort involved", paraphrase: "More work for people who are not vegan themselves." },
          { phrase: "invariably amazed", paraphrase: "Guests are always surprised in the same positive way." }
        ]
      },
      {
        short: "Sarah",
        title: "Going vegan — Sarah (B)",
        passage:
          "I went vegan when I left home and went away to university. My parents were worried I was missing out on essential nutrients and that this could have serious consequences for me. My dad had the biggest problem with it, and he kept sending me articles warning of the pitfalls of a plant-based diet. I tried to put his mind at rest by telling him I was taking supplements, but that just served to reinforce his idea that I wasn't eating properly. Over time, though, they've both gradually come to accept my change to veganism, and that's really important to me, because it's a major part of who I am. My dad even cooks some of the vegan recipes I send him.",
        items: [
          { phrase: "missing out on essential nutrients", paraphrase: "Not getting vitamins and minerals you need." },
          { phrase: "pitfalls of a plant-based diet", paraphrase: "Risks Dad's articles warn about." },
          { phrase: "put his mind at rest", paraphrase: "Stop your dad worrying with reassurance." },
          { phrase: "reinforce his idea", paraphrase: "Make his belief even stronger (here, the wrong belief)." },
          { phrase: "gradually come to accept", paraphrase: "Slowly accept your choice over time." }
        ]
      },
      {
        short: "Maya",
        title: "Going vegan — Maya (C)",
        passage:
          "My sister decided to go vegan to see if a plant-based diet would help her feel better while managing a long-term health condition. I decided to support her by going vegan as well. My sister has kept at it faithfully for over five years and shown amazing willpower. I just wish I could say the same for myself. There were too many types of food I missed, and I threw in the towel after a few months. On the plus side, I learnt a surprising amount about nutrition and the health benefits of certain foods. I still eat loads of fruit, nuts, pulses and vegetables, and feel much healthier than I used to.",
        items: [
          { phrase: "managing a long-term health condition", paraphrase: "Living with an illness that lasts a long time." },
          { phrase: "kept at it faithfully", paraphrase: "Stuck to vegan food without giving up for years." },
          { phrase: "shown amazing willpower", paraphrase: "Proved very strong self-control." },
          { phrase: "threw in the towel", paraphrase: "Gave up on being vegan after a few months." },
          { phrase: "On the plus side", paraphrase: "The good thing that came from the attempt." },
          { phrase: "the health benefits of certain foods", paraphrase: "Why some ingredients are good for your body." }
        ]
      },
      {
        short: "Justin",
        title: "Going vegan — Justin (D)",
        passage:
          "I started off by swapping one product at a time; soya milk for cow's milk, coconut oil for butter, maple syrup for honey. Many people try to make the switch overnight and it can prove too much, so they give up and go back to their vegetarian or meat-based diet. The key is to do it in stages. It gives you time to work out what works for you and what doesn't. While I was going vegan, I got loads of useful tips from a social media group I joined. If I had any questions or concerns, like which health supplements to take, how to reassure my parents I knew what I was doing, or where to buy vegan products, there was always someone who could give me the benefit of their knowledge and experience.",
        items: [
          { phrase: "make the switch overnight", paraphrase: "Change your whole diet in one go." },
          { phrase: "prove too much", paraphrase: "Be more than you can manage, so you quit." },
          { phrase: "do it in stages", paraphrase: "Change step by step, product by product." },
          { phrase: "work out what works for you", paraphrase: "Learn which swaps suit you personally." },
          { phrase: "reassure my parents", paraphrase: "Convince your parents you know what you are doing." },
          { phrase: "give me the benefit of their knowledge and experience", paraphrase: "Let others share what they already learned." }
        ]
      },
      {
        short: "Rhona",
        title: "Going vegan — Rhona (E)",
        passage:
          "I've only recently changed to a plant-based diet. I wish I'd done it ages ago. I'd become increasingly aware of the suffering we cause to animals by what we eat, and I felt it was high time I took a stand against the way we treat them. It's not easy, though. My friends only ever want to meet up in burger restaurants, and my parents seem determined not to try vegan food, let alone cook it, which is disappointing \u2014 it's not asking much for them to show a little interest. So, anyway, I just cook all my meals for myself now. I'm gradually getting the hang of it, and I like the independence it brings.",
        items: [
          { phrase: "done it ages ago", paraphrase: "Started much earlier in the past." },
          { phrase: "become increasingly aware of", paraphrase: "Notice more and more over time." },
          { phrase: "it was high time", paraphrase: "You felt you had waited long enough to act." },
          { phrase: "took a stand against", paraphrase: "Refused to accept how animals are treated." },
          { phrase: "let alone cook it", paraphrase: "Not even try it — never mind preparing it." },
          { phrase: "it's not asking much", paraphrase: "A small, reasonable request of your parents." },
          { phrase: "getting the hang of it", paraphrase: "Learning to cook for yourself with practice." }
        ]
      }
    ];

    var roundIndex = 0;
    var itemIndex = 0;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function wrapPhrases(passage, items) {
      var pairs = items
        .map(function (it, i) {
          var idx = passage.indexOf(it.phrase);
          return idx >= 0 ? { idx: idx, i: i, phrase: it.phrase } : null;
        })
        .filter(Boolean)
        .sort(function (a, b) {
          return a.idx - b.idx;
        });
      var out = "";
      var cursor = 0;
      pairs.forEach(function (p) {
        out += escapeHtml(passage.slice(cursor, p.idx));
        out +=
          '<span class="pick" data-i="' +
          p.i +
          '" role="button" tabindex="0">' +
          escapeHtml(p.phrase) +
          "</span>";
        cursor = p.idx + p.phrase.length;
      });
      out += escapeHtml(passage.slice(cursor));
      return "<p>" + out.replace(/\n\n/g, "</p><p>") + "</p>";
    }

    function updateProgress() {
      var r = ROUNDS[roundIndex];
      var total = r.items.length;
      var done = itemIndex >= total;
      var cur = done ? total : itemIndex + 1;
      var pct = total ? (cur / total) * 100 : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("itemCounter").textContent =
        "Item " + (done ? total : cur) + " / " + total + " · Round " + (roundIndex + 1) + " / " + ROUNDS.length;
    }

    function bindPicks() {
      document.querySelectorAll(".pick").forEach(function (el) {
        el.replaceWith(el.cloneNode(true));
      });
      document.querySelectorAll(".pick").forEach(function (el) {
        var i = Number(el.getAttribute("data-i"));
        if (i < itemIndex) return;
        function handler() {
          onPick(i, el);
        }
        el.addEventListener("click", handler);
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            handler();
          }
        });
      });
    }

    function onPick(i, el) {
      var r = ROUNDS[roundIndex];
      if (itemIndex >= r.items.length || el.classList.contains("done")) return;
      if (i > itemIndex) {
        el.classList.add("wrong-flash");
        setTimeout(function () {
          el.classList.remove("wrong-flash");
        }, 450);
        return;
      }
      if (i < itemIndex) return;
      addScore(1);
      document.getElementById("totalScore").textContent = String(getScore());
      if (itemIndex < r.items.length - 1) {
        itemIndex += 1;
        render();
      } else {
        itemIndex = r.items.length;
        document.getElementById("paraphraseBox").textContent =
          "Round complete — press Next round to continue.";
        render();
        if (roundIndex === ROUNDS.length - 1) {
          document.getElementById("allDone").classList.add("show");
        }
      }
    }

    function render() {
      document.getElementById("totalScore").textContent = String(getScore());
      document.getElementById("chainNote").textContent =
        "Chain: Jack → Sarah → Maya → Justin → Rhona";
      var r = ROUNDS[roundIndex];
      document.getElementById("speakerLabel").textContent = r.title;
      document.getElementById("passageBox").innerHTML = wrapPhrases(r.passage, r.items);
      if (itemIndex < r.items.length) {
        document.getElementById("paraphraseBox").textContent = r.items[itemIndex].paraphrase;
      }
      var picks = document.querySelectorAll(".pick");
      var roundDone = itemIndex >= r.items.length;
      picks.forEach(function (el) {
        var i = Number(el.getAttribute("data-i"));
        el.classList.remove("wrong-flash");
        if (i < itemIndex || roundDone) el.classList.add("done");
        else el.classList.remove("done");
      });
      document.getElementById("btnPrevRound").disabled = roundIndex === 0;
      document.getElementById("btnNextRound").disabled =
        !roundDone || roundIndex === ROUNDS.length - 1;
      updateProgress();
      bindPicks();
    }

    document.getElementById("btnNextRound").addEventListener("click", function () {
      if (roundIndex < ROUNDS.length - 1) {
        roundIndex += 1;
        itemIndex = 0;
        document.getElementById("allDone").classList.remove("show");
        render();
      }
    });
    document.getElementById("btnPrevRound").addEventListener("click", function () {
      if (roundIndex > 0) {
        roundIndex -= 1;
        itemIndex = 0;
        document.getElementById("allDone").classList.remove("show");
        render();
      }
    });

    render();
  </script>
</body>
</html>
