[build]
  command = "node scripts/build-netlify-track.mjs cpe"
  publish = "publish-cpe"

[build.environment]
  NODE_VERSION = "20"

# Default = CPE site. For three domains, add two more Netlify sites from this repo:
#   EGE: build  node scripts/build-netlify-track.mjs ege   publish  publish-ege
#   FCE: build  node scripts/build-netlify-track.mjs fce   publish  publish-fce
# See scripts/NETLIFY-SPLIT.txt
