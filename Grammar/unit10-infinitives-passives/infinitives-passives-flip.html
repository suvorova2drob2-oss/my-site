<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 10 Grammar — Infinitives after passives (flip cards)</title>
  <style>
    :root {
      --panel: #1d2b4a;
      --line: #324a71;
      --text: #e8f0ff;
      --muted: #9bb0d3;
      --accent: #56ccf2;
      --front-bg: #223657;
      --back-bg: #182d52;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(180deg, #09122a 0%, #101d3c 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.62;
    }
    .page {
      width: min(720px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px 22px 28px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 16px;
    }
    .top h1 { font-size: 1.12rem; font-weight: 700; max-width: min(100%, 520px); line-height: 1.35; }
    .back {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
    }
    .back:hover { text-decoration: underline; }

    .instr {
      font-size: 0.94rem;
      color: #d5e2f8;
      margin-bottom: 10px;
    }
    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .card-wrap {
      margin-bottom: 16px;
    }
    .card-meta {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .flip-card {
      perspective: 1100px;
      cursor: pointer;
      outline: none;
      border-radius: 14px;
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      color: inherit;
      text-align: left;
    }
    .flip-card:focus-visible {
      box-shadow: 0 0 0 3px rgba(86, 204, 242, 0.45);
      border-radius: 14px;
    }

    .flip-inner {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flip-card.is-flipped .flip-inner {
      transform: rotateY(180deg);
    }

    .flip-face {
      grid-area: 1 / 1;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 16px 18px;
      font-size: 0.94rem;
      line-height: 1.65;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flip-front {
      background: var(--front-bg);
      color: #f1f5ff;
    }
    .flip-back {
      background: var(--back-bg);
      color: #e8f0ff;
      transform: rotateY(180deg);
    }

    .gap {
      border-bottom: 2px dashed rgba(148, 163, 184, 0.65);
      padding: 0 4px 2px;
      font-weight: 600;
      color: #cbd5f5;
    }

    .flip-back strong {
      color: #86efac;
      font-weight: 700;
    }
    .flip-tag {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a7f3d0;
      margin-bottom: 10px;
    }
    .tap-hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .prompt-cue {
      font-size: 0.88rem;
      color: #fde68a;
      font-weight: 700;
      margin-top: 10px;
    }

    .hub-link {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 0.88rem;
    }
    .hub-link a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <h1>Language focus &mdash; Infinitives after passives (flip cards)</h1>
      <a class="back" href="index.html">&larr; Text reference</a>
    </header>

    <p class="instr">
      Transform each prompt as in the textbook (passive + infinitive &harr; <em>It is</em> &hellip; <em>that</em> &hellip;).
    </p>
    <p class="hint">Click a card (or press Space / Enter when focused) to flip and check the answer.</p>

    <div class="card-wrap">
      <div class="card-meta">1</div>
      <button type="button" class="flip-card" aria-label="Card 1. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            Change the following sentence in the same way:<br />
            <em>He is believed to have made up the story about being mugged.</em>
            <div class="prompt-cue">&ldquo;It&hellip;&rdquo;</div>
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            It <strong>is believed that he made up</strong> the story about being mugged.
          </div>
        </div>
      </button>
    </div>

    <div class="card-wrap">
      <div class="card-meta">2</div>
      <button type="button" class="flip-card" aria-label="Card 2. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            It is <strong>believed</strong> that continual nose touching <strong>indicates</strong> that someone is lying.<br /><br />
            Continual nose touching is <span class="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> that someone is lying.
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            Continual nose touching <strong>is believed to indicate</strong> that someone is lying.
          </div>
        </div>
      </button>
    </div>

    <div class="card-wrap">
      <div class="card-meta">3</div>
      <button type="button" class="flip-card" aria-label="Card 3. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            It is <strong>said</strong> that people who repeatedly cover their mouth <strong>are trying</strong> to hide the truth.<br /><br />
            People who repeatedly cover their mouth <span class="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> to hide the truth.
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            People who repeatedly cover their mouth <strong>are said to be trying</strong> to hide the truth.
          </div>
        </div>
      </button>
    </div>

    <div class="card-wrap">
      <div class="card-meta">4</div>
      <button type="button" class="flip-card" aria-label="Card 4. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            It is <strong>considered</strong> that avoiding eye contact <strong>is</strong> a sure sign of deception.<br /><br />
            Avoiding eye contact <span class="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> a sure sign of deception.
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            Avoiding eye contact <strong>is considered to be</strong> a sure sign of deception.
          </div>
        </div>
      </button>
    </div>

    <div class="card-wrap">
      <div class="card-meta">5</div>
      <button type="button" class="flip-card" aria-label="Card 5. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            People <strong>think</strong> that we <strong>use</strong> fewer hand gestures when telling a lie.<br /><br />
            We <span class="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> fewer hand gestures when telling a lie.
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            We <strong>are thought to use</strong> fewer hand gestures when telling a lie.
          </div>
        </div>
      </button>
    </div>

    <div class="card-wrap">
      <div class="card-meta">6</div>
      <button type="button" class="flip-card" aria-label="Card 6. Flip to see answer." aria-pressed="false">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            Everyone <strong>knows</strong> he <strong>lied</strong> because he kept moving about in his chair.<br /><br />
            He <span class="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> because he kept moving about in his chair.
            <div class="tap-hint">Tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div class="flip-tag">Answer</div>
            He <strong>is known to have lied</strong> because he kept moving about in his chair.
          </div>
        </div>
      </button>
    </div>

    <p class="hub-link">
      <a href="index.html">&larr; Back to textbook reference</a>
    </p>
  </main>

  <script>
(function () {
  document.querySelectorAll(".flip-card").forEach(function (card) {
    function toggle() {
      var on = card.classList.toggle("is-flipped");
      card.setAttribute("aria-pressed", on ? "true" : "false");
    }
    card.addEventListener("click", function (e) {
      e.preventDefault();
      toggle();
    });
    card.addEventListener("keydown", function (e) {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        toggle();
      }
    });
  });
})();
  </script>
</body>
</html>
