    <h1>9.2 Sally Hurst &mdash; Superstition Mountains (transcript)</h1>
    <p class="note">Study only. Text aligns with Ready for C2 / B2 First Skills Booster style recordings; not for use in timed exam practice.</p>
    <div class="box" id="tx"></div>
  </div>
  <script>
    document.getElementById("tx").textContent =
      "Hi, I'm Sally Hurst and I've just got back from Arizona, where " +
      "I spent two weeks in the Superstition Mountain Range, near " +
      "Phoenix. Besides being known for its luxury desert golf courses, " +
      "the area also attracts enthusiasts of more energetic outdoor " +
      "activities like rock climbing or mountain biking. And I was lucky " +
      "enough to go hiking when I was there. There are miles of paths " +
      "and the scenery is absolutely spectacular.\n\n" +
      "As you'd expect, it can get quite hot in the desert. It's late spring " +
      "now, of course, and that's not unbearable. Autumn isn't too bad " +
      "either, but I'd certainly advise against going there in summer. " +
      "Temperatures can reach the high forties – and that's more than a " +
      "little uncomfortable for most.\n\n" +
      "The reason I went there was to research some of the legends and " +
      "mysteries of the area for a radio documentary. The very origin " +
      "of the name, 'Superstition Mountains' is itself a bit of a mystery. " +
      "One theory says they were given their name by sixteenth-century " +
      "Spanish settlers, some of whom inexplicably vanished when they " +
      "went exploring there. But the more likely explanation is that it " +
      "came about in the nineteenth century, when it was discovered " +
      "that the local Pima Indians were frightened of the mountains. " +
      "Farmers in the area attributed this fear to superstition, and they " +
      "decided to give that name first to one mountain, and then the " +
      "whole range.\n\n" +
      "Perhaps the most talked about mystery in the area is that of " +
      "the so-called, 'Lost Dutchman's Mine', which is supposedly " +
      "somewhere in the Superstition Mountains. Far from being " +
      "Dutch, however, the owner of the gold mine in question, Jacob " +
      "Waltz, was in fact German, or Deutsch in his native language. " +
      "Waltz arrived in the United States in November 1839, and spent " +
      "virtually all his life there prospecting for gold, firstly in North " +
      "Carolina, then Georgia, California and finally Arizona. When he " +
      "passed away in October 1891 he took the secret of his mine with " +
      "him to his grave.\n\n" +
      "You see, apparently Waltz had found what was believed by some " +
      "to be the richest gold mine in the world. But he didn't give away " +
      "its location to anyone, and it's a mystery which remains unsolved " +
      "to this day. According to one estimate in the late nineteen " +
      "seventies, up to eight thousand people a year attempted to locate " +
      "the mine. Even now, people still haven't given up searching, " +
      "despite the ban on mineral prospecting in 1983, and many " +
      "continue to head for the region to look for the gold.\n\n" +
      "Waltz left a few clues, but without revealing very much. In one of " +
      "them, for example, he says, 'The rays of the setting sun shine into " +
      "the entrance of my mine', but that could be just about anywhere.\n\n" +
      "I did a lot of my research for the documentary in a museum; The " +
      "Superstition Mountain Museum. It's full of information on the " +
      "Lost Dutchman's Mine, including a whole set of maps which are " +
      "thought to show its location – not that that's been of any use to " +
      "anyone! So far, anyway.\n\n" +
      "And I saw another exhibit on the mine in a museum in nearby " +
      "Goldfield. Now Goldfield was a prosperous mining town at " +
      "the end of the nineteenth century, but when the gold ran out, " +
      "everyone left and now it's a ghost town. It's become a popular " +
      "tourist attraction as well, of course, with museums, rides and " +
      "shows, but it's still quite impressive, nevertheless.\n\n" +
      "Now you may have seen a film that was made in 1949 about " +
      "the Lost Dutchman's Mine entitled Lust for Gold, starring Glenn " +
      "Ford in the role of Jacob Waltz. But here's another piece of trivia " +
      "for you: in 1960, actor Walter Brennan recorded a song on the subject called Dutchman's Gold.";
  </script>
