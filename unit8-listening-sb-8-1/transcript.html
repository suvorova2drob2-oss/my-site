<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB 8.1 &mdash; Transcript (study)</title>
  <style>
    :root { --text: #e8f0ff; --muted: #94a3b8; --primary: #56ccf2; --panel: #1d2b4a; --line: #324a71; }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #09122a 0%, #101d3c 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.6;
    }
    .shell { max-width: 720px; margin: 0 auto; }
    a.back { color: var(--primary); font-weight: 600; text-decoration: none; font-size: 14px; }
    a.back:hover { text-decoration: underline; }
    h1 { font-size: 1.2rem; margin: 12px 0 8px; }
    .note { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    .block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .block h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: #7dd3fc; margin: 0 0 10px; }
    .block p { margin: 0 0 10px; font-size: 15px; }
    .block p:last-child { margin-bottom: 0; }
    audio { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
