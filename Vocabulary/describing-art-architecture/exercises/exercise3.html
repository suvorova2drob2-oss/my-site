<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 3 — Describing art &amp; architecture</title>
  <script src="../../../js/interior-design-vocab-core.js"></script>
  <script src="../../../js/prep-course-progress.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #34d399;
      --bad: #f43f5e;
      --line: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; overflow-x: clip; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: max(20px, env(safe-area-inset-top, 0px))
        max(14px, env(safe-area-inset-right, 0px))
        max(24px, env(safe-area-inset-bottom, 0px))
        max(14px, env(safe-area-inset-left, 0px));
    }
    .wrap { width: 100%; max-width: 640px; margin: 0 auto; }
    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .top a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      touch-action: manipulation;
    }
    .top a:hover { text-decoration: underline; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px 18px 22px;
    }
    h1 { font-size: 1.15rem; line-height: 1.3; margin-bottom: 8px; }
    .instr {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .word-bank {
      font-size: 13px;
      color: #e2e8f0;
      margin: 0 0 18px;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 12px;
      line-height: 1.55;
    }
    .word-bank code {
      color: var(--accent);
      font-weight: 700;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .def-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 18px; }
    .item-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 10px;
      font-size: clamp(14px, 3.6vw, 16px);
      line-height: 1.55;
      color: #e2e8f0;
    }
    .item-row .num {
      flex: 0 0 auto;
      font-weight: 800;
      color: var(--accent);
      min-width: 1.25rem;
    }
    .item-row .stem { flex: 1 1 200px; }
    .inputs {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      flex: 1 1 220px;
    }
    .inputs input {
      flex: 1 1 120px;
      min-width: 100px;
      font: inherit;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
    }
    .inputs input:disabled { opacity: 0.75; }
    .inputs input.good { border-color: var(--ok); box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.35); }
    .inputs input.bad { border-color: var(--bad); box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.35); }
    .inputs .and { font-size: 13px; color: var(--muted); font-weight: 600; }
    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      font: inherit;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      min-height: 48px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-primary { background: var(--accent); color: #0c1222; }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #334155;
      color: var(--text);
    }
    .feedback {
      min-height: 24px;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
    }
    .feedback.ok { color: var(--ok); }
    .feedback.bad { color: var(--bad); }
    .next-task {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      text-align: center;
      display: none;
    }
    .next-task.visible { display: block; }
    .next-task a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 800;
      color: #0c1222;
      background: linear-gradient(135deg, #34d399, var(--accent));
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 14px;
      min-height: 52px;
      touch-action: manipulation;
    }
    .next-task p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.45;
    }
    .focus-strip {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }
    .focus-strip span {
      display: inline-block;
      margin: 0 3px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      font-weight: 600;
    }
    @media (max-width: 420px) {
      .card { padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="index.html">&larr; Exercises</a>
      <a href="exercise2.html">&larr; Exercise 2</a>
    </div>
    <div class="card">
      <h1 id="t3-title">Exercise 3</h1>
      <p class="instr" id="t3-instr"></p>
      <p class="word-bank" id="word-bank"></p>
      <div class="def-list" id="def-list" aria-label="Definitions"></div>
      <div class="row-actions">
        <button type="button" class="btn btn-primary" id="btn-check" disabled>Check</button>
        <button type="button" class="btn btn-secondary" id="btn-clear">Clear</button>
        <button type="button" class="btn btn-secondary" id="btn-reveal" style="display:none;">Show answers</button>
      </div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <div class="next-task" id="next-task">
        <a href="index.html">Back to exercises</a>
        <p>All items correct.</p>
      </div>
      <p class="focus-strip" id="focus-strip"></p>
    </div>
  </div>
  <script>
(function () {
  var core = window.INTERIOR_DESIGN_VOCAB_CORE;
  var T = core && core.exercise3;
  if (!T || !T.items || !T.items.length) {
    document.getElementById("feedback").textContent = "Missing exercise3 in interior-design-vocab-core.js.";
    document.getElementById("feedback").className = "feedback bad";
    return;
  }

  var aliases = T.normalizeAliases || {};
  function normWord(s) {
    var t = String(s || "")
      .toLowerCase()
      .replace(/[.,;:!?]+$/g, "")
      .trim()
      .replace(/\s+/g, " ");
    if (aliases[t]) return aliases[t];
    return t;
  }

  function singleOk(item, raw) {
    var u = normWord(raw);
    if (!u) return false;
    for (var i = 0; i < item.accept.length; i++) {
      if (normWord(item.accept[i]) === u) return true;
    }
    return false;
  }

  function pairOk(item, rawA, rawB) {
    var a = normWord(rawA);
    var b = normWord(rawB);
    if (!a || !b || a === b) return false;
    var pool = {};
    for (var i = 0; i < item.pool.length; i++) pool[normWord(item.pool[i])] = true;
    return pool[a] && pool[b];
  }

  var elTitle = document.getElementById("t3-title");
  var elInstr = document.getElementById("t3-instr");
  var elBank = document.getElementById("word-bank");
  var elList = document.getElementById("def-list");
  var elCheck = document.getElementById("btn-check");
  var elClear = document.getElementById("btn-clear");
  var elReveal = document.getElementById("btn-reveal");
  var elFb = document.getElementById("feedback");
  var elNext = document.getElementById("next-task");
  var elFocus = document.getElementById("focus-strip");

  elTitle.textContent = T.title;
  elInstr.innerHTML = T.instruction;
  elBank.innerHTML = T.wordBank || "";

  if (T.focusPhrases && T.focusPhrases.length) {
    elFocus.innerHTML =
      "<strong>Key vocabulary:</strong> " +
      T.focusPhrases
        .map(function (p) {
          return "<span>" + p + "</span>";
        })
        .join(" · ");
  }

  var inputsByItem = {};
  var allInputEls = [];
  var failedOnce = false;

  function updateRevealVisibility() {
    if (locked) {
      elReveal.style.display = "none";
      return;
    }
    elReveal.style.display = failedOnce ? "block" : "none";
  }

  for (var ri = 0; ri < T.items.length; ri++) {
    var it = T.items[ri];
    var row = document.createElement("div");
    row.className = "item-row";
    row.dataset.itemId = String(it.id);

    var num = document.createElement("span");
    num.className = "num";
    num.textContent = String(it.id) + ".";

    var stem = document.createElement("span");
    stem.className = "stem";
    stem.textContent = it.stem;

    var wrapIn = document.createElement("div");
    wrapIn.className = "inputs";

    if (it.kind === "pair") {
      var in1 = document.createElement("input");
      in1.type = "text";
      in1.autocomplete = "off";
      in1.setAttribute("aria-label", "Adjective 1 for item " + it.id);
      var mid = document.createElement("span");
      mid.className = "and";
      mid.textContent = "and";
      var in2 = document.createElement("input");
      in2.type = "text";
      in2.autocomplete = "off";
      in2.setAttribute("aria-label", "Adjective 2 for item " + it.id);
      wrapIn.appendChild(in1);
      wrapIn.appendChild(mid);
      wrapIn.appendChild(in2);
      inputsByItem[it.id] = [in1, in2];
      allInputEls.push(in1, in2);
    } else {
      var inp = document.createElement("input");
      inp.type = "text";
      inp.autocomplete = "off";
      inp.setAttribute("aria-label", "Answer for item " + it.id);
      wrapIn.appendChild(inp);
      inputsByItem[it.id] = [inp];
      allInputEls.push(inp);
    }

    row.appendChild(num);
    row.appendChild(stem);
    row.appendChild(wrapIn);
    elList.appendChild(row);
  }

  var locked = false;

  function refreshCheckState() {
    if (locked) {
      elCheck.disabled = true;
      return;
    }
    var ok = true;
    for (var i = 0; i < allInputEls.length; i++) {
      if (!String(allInputEls[i].value || "").trim()) {
        ok = false;
        break;
      }
    }
    elCheck.disabled = !ok;
  }

  function clearInputMarks() {
    for (var i = 0; i < allInputEls.length; i++) {
      allInputEls[i].classList.remove("good", "bad");
    }
  }

  function setLocked(v) {
    locked = v;
    for (var i = 0; i < allInputEls.length; i++) {
      allInputEls[i].disabled = v;
    }
    elClear.disabled = v;
    updateRevealVisibility();
    refreshCheckState();
  }

  for (var li = 0; li < allInputEls.length; li++) {
    allInputEls[li].addEventListener("input", function () {
      if (!locked) {
        clearInputMarks();
        elFb.textContent = "";
        elFb.className = "feedback";
        elNext.classList.remove("visible");
      }
      refreshCheckState();
    });
  }

  elClear.addEventListener("click", function () {
    if (locked) return;
    for (var i = 0; i < allInputEls.length; i++) {
      allInputEls[i].value = "";
    }
    clearInputMarks();
    elFb.textContent = "";
    elFb.className = "feedback";
    elNext.classList.remove("visible");
    failedOnce = false;
    updateRevealVisibility();
    refreshCheckState();
  });

  function awardFirstPass() {
    var pts = T.pointsFirstPass != null ? T.pointsFirstPass : T.items.length;
    if (window.prepProgressAward) {
      var r = prepProgressAward(T.id, pts);
      if (r.awarded) return " +" + String(r.points) + " home score (first pass).";
    }
    return "";
  }

  elCheck.addEventListener("click", function () {
    if (locked || elCheck.disabled) return;
    clearInputMarks();
    var wrong = [];
    var okN = 0;

    for (var ci = 0; ci < T.items.length; ci++) {
      var item = T.items[ci];
      var els = inputsByItem[item.id];
      var good = false;
      if (item.kind === "pair") {
        good = pairOk(item, els[0].value, els[1].value);
        if (good) {
          els[0].classList.add("good");
          els[1].classList.add("good");
        } else {
          els[0].classList.add("bad");
          els[1].classList.add("bad");
        }
      } else {
        good = singleOk(item, els[0].value);
        if (good) els[0].classList.add("good");
        else els[0].classList.add("bad");
      }
      if (good) okN++;
      else wrong.push(item.id);
    }

    if (okN === T.items.length) {
      elFb.textContent = "Perfect — " + okN + " / " + T.items.length + "." + awardFirstPass();
      elFb.className = "feedback ok";
      setLocked(true);
      elNext.classList.add("visible");
    } else {
      failedOnce = true;
      updateRevealVisibility();
      elFb.textContent =
        okN +
        " / " +
        T.items.length +
        " correct. Check item(s): " +
        wrong.join(", ") +
        ".";
      elFb.className = "feedback bad";
    }
  });

  elReveal.addEventListener("click", function () {
    if (locked) return;
    for (var ci = 0; ci < T.items.length; ci++) {
      var item = T.items[ci];
      var els = inputsByItem[item.id];
      if (item.kind === "pair") {
        var ex = item.examplePair || ["minimalistic", "flamboyant"];
        els[0].value = ex[0];
        els[1].value = ex[1];
      } else {
        els[0].value = item.accept[0];
      }
    }
    clearInputMarks();
    for (var i = 0; i < allInputEls.length; i++) {
      allInputEls[i].classList.add("good");
    }
    elFb.textContent = "Example answers filled in." + awardFirstPass();
    elFb.className = "feedback ok";
    setLocked(true);
    elNext.classList.add("visible");
    refreshCheckState();
  });

  refreshCheckState();
  updateRevealVisibility();
})();
  </script>
</body>
</html>
