<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 3 — Fill-in-the-blanks — Prepositional phrases</title>
  <script src="../../../js/prepositional-phrases-core.js"></script>
  <script src="../../../js/prep-course-progress.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #34d399;
      --bad: #f43f5e;
      --line: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; overflow-x: clip; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top, 0px))
        max(12px, env(safe-area-inset-right, 0px))
        max(22px, env(safe-area-inset-bottom, 0px))
        max(12px, env(safe-area-inset-left, 0px));
    }
    .wrap { width: 100%; max-width: 720px; margin: 0 auto; }
    .top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    .top a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      touch-action: manipulation;
    }
    .top a:hover { text-decoration: underline; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px 16px 22px;
    }
    h1 { font-size: 1.12rem; margin-bottom: 8px; line-height: 1.3; }
    .instr {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 20px;
    }
    .q {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid #2d3f54;
    }
    .q:last-of-type { border-bottom: none; margin-bottom: 8px; padding-bottom: 0; }
    .q-num {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .q-line {
      font-size: 15px;
      line-height: 1.65;
      color: #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
    }
    .q-line input {
      flex: 1 1 160px;
      min-width: 140px;
      max-width: 100%;
      font: inherit;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px solid var(--line);
      background: #0f172a;
      color: var(--text);
      outline: none;
    }
    .q-line input:focus { border-color: var(--accent); }
    .q-line input.ok { border-color: var(--ok); }
    .q-line input.bad { border-color: var(--bad); }
    .q-feedback {
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
      color: var(--muted);
    }
    .q-feedback.ok { color: var(--ok); }
    .q-feedback.bad { color: var(--bad); }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      font: inherit;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      min-height: 48px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-primary { background: var(--accent); color: #0c1222; }
    .btn-secondary { background: #334155; color: var(--text); }
    .sum {
      margin-top: 12px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      min-height: 24px;
    }
    .sum.ok { color: var(--ok); }
    .sum.bad { color: var(--bad); }
    .next-run {
      margin-top: 16px;
      text-align: center;
    }
    .next-run a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      font-size: 15px;
      touch-action: manipulation;
    }
    .next-run a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="../index.html">&larr; Hub</a>
      <a href="task2.html">&larr; Exercise 2</a>
    </div>
    <div class="card">
      <h1 id="t3-title"></h1>
      <p class="instr" id="t3-instr"></p>
      <div id="questions"></div>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-check">Check answers</button>
        <button type="button" class="btn btn-secondary" id="btn-clear">Clear inputs</button>
      </div>
      <p class="sum" id="sum" aria-live="polite"></p>
      <p class="next-run"><a href="task4.html">Exercise 4 &rarr; conversations (letter hints)</a></p>
    </div>
  </div>
  <script>
(function () {
  var core = window.PREP_PHRASES_CORE;
  if (!core || !core.tasks) return;
  var T = null;
  for (var ti = 0; ti < core.tasks.length; ti++) {
    if (core.tasks[ti].id === 'task-03-fill-from-ex2') {
      T = core.tasks[ti];
      break;
    }
  }
  if (!T || !T.items) return;

  function norm(s) {
    return String(s || '')
      .toLowerCase()
      .replace(/\u2019|\u2018|`/g, "'")
      .replace(/[\u2013\u2014]/g, '-')
      .replace(/\s+/g, ' ')
      .replace(/\.+$/, '')
      .trim();
  }

  function matchesAcceptable(got, acc) {
    var g = norm(got);
    if (!g) return false;
    for (var i = 0; i < acc.length; i++) {
      if (norm(acc[i]) === g) return true;
    }
    return false;
  }

  document.getElementById('t3-title').textContent = T.title;
  document.getElementById('t3-instr').innerHTML = T.instruction;

  var host = document.getElementById('questions');
  host.innerHTML = '';
  for (var qi = 0; qi < T.items.length; qi++) {
    var it = T.items[qi];
    var wrap = document.createElement('div');
    wrap.className = 'q';
    wrap.dataset.id = it.id;
    var num = document.createElement('div');
    num.className = 'q-num';
    num.textContent = 'Question ' + String(qi + 1);
    var line = document.createElement('label');
    line.className = 'q-line';
    line.appendChild(document.createTextNode(it.before));
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.setAttribute('autocomplete', 'off');
    inp.setAttribute('spellcheck', 'false');
    inp.id = 'inp-' + it.id;
    inp.setAttribute('aria-label', 'Your answer for question ' + String(qi + 1));
    line.appendChild(inp);
    line.appendChild(document.createTextNode(it.after));
    var fb = document.createElement('div');
    fb.className = 'q-feedback';
    fb.id = 'fb-' + it.id;
    wrap.appendChild(num);
    wrap.appendChild(line);
    wrap.appendChild(fb);
    host.appendChild(wrap);
  }

  document.getElementById('btn-check').addEventListener('click', function () {
    var ok = 0;
    for (var i = 0; i < T.items.length; i++) {
      var it = T.items[i];
      var inp = document.getElementById('inp-' + it.id);
      var fb = document.getElementById('fb-' + it.id);
      var good = matchesAcceptable(inp.value, it.acceptable);
      inp.classList.remove('ok', 'bad');
      fb.className = 'q-feedback';
      if (good) {
        ok++;
        inp.classList.add('ok');
        fb.textContent = '✓ Model: ' + it.teach;
        fb.classList.add('ok');
      } else {
        inp.classList.add('bad');
        fb.textContent = 'Expected something like: ' + it.teach;
        fb.classList.add('bad');
      }
    }
    var sum = document.getElementById('sum');
    sum.textContent = ok === T.items.length ? 'All ' + String(T.items.length) + ' correct — well done.' : String(ok) + ' / ' + String(T.items.length) + ' correct. Fix the red boxes and check again.';
    sum.className = 'sum' + (ok === T.items.length ? ' ok' : ' bad');
    if (ok === T.items.length) {
      var pts3 = T.pointsFirstPass != null ? T.pointsFirstPass : 8;
      if (window.prepProgressAward) {
        var r3 = prepProgressAward(T.id, pts3);
        if (r3.awarded) {
          sum.textContent += ' +' + String(r3.points) + ' home score (first pass).';
        }
      }
    }
  });

  document.getElementById('btn-clear').addEventListener('click', function () {
    for (var i = 0; i < T.items.length; i++) {
      var it = T.items[i];
      var inp = document.getElementById('inp-' + it.id);
      var fb = document.getElementById('fb-' + it.id);
      inp.value = '';
      inp.classList.remove('ok', 'bad');
      fb.textContent = '';
      fb.className = 'q-feedback';
    }
    var sm = document.getElementById('sum');
    sm.textContent = '';
    sm.className = 'sum';
  });
})();
  </script>
</body>
</html>
