<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 12 — Lexical games</title>
  <style>
    :root {
      --panel: #1d2b4a;
      --panel-soft: #223657;
      --line: #324a71;
      --text: #e8f0ff;
      --muted: #9bb0d3;
      --accent: #56ccf2;
      --ok: #34d399;
      --bad: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(180deg, #09122a 0%, #101d3c 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }
    .page {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 18px;
    }
    .top h1 { font-size: 1.5rem; }
    .back { color: var(--accent); text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
    .subtitle { color: var(--muted); margin-bottom: 14px; line-height: 1.45; }
    .live-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #1a2d4b;
      color: #d7e8ff;
      text-decoration: none;
      padding: 9px 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .live-link:hover {
      border-color: var(--accent);
      color: #e9f7ff;
    }
    .folder {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .single-open .folder:not(.open) {
      display: none;
    }
    .folder strong {
      display: block;
      font-size: 1.03rem;
      margin-bottom: 6px;
    }
    .folder .desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .folder .hint {
      color: var(--accent);
      font-size: 0.82rem;
      margin-top: 6px;
    }
    .folder .pool {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #3a5278;
      padding-top: 10px;
    }
    .folder.open .pool { display: block; }
    .theme-game-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .theme-game-btn {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #1a2d4b;
      color: #d7e8ff;
      padding: 9px 10px;
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 700;
    }
    .trainer-box {
      border: 1px solid #3b567f;
      border-radius: 12px;
      padding: 12px;
      background: rgba(13, 26, 50, 0.45);
    }
    .scoreline { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
    .scoreline b { color: var(--ok); }
    .pack-tabs, .speaker-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tab {
      border: 1px solid #48658f;
      background: #1a2d4b;
      color: #c7dbf8;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .tab.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); color: #fff; }
    .top-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px; }
    .lives { font-size: 1.4rem; letter-spacing: 3px; }
    .counter { color: var(--muted); font-size: 0.9rem; }
    .hint-label { color: var(--accent); font-weight: 700; font-size: 0.82rem; margin-bottom: 4px; }
    .hint-box {
      border: 1px solid #3e5f8f;
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px;
      background: rgba(56, 189, 248, 0.08);
      margin-bottom: 10px;
    }
    .line-box {
      border: 1px solid #3a5279;
      border-radius: 10px;
      padding: 12px;
      background: #152744;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .line-box input {
      width: 220px;
      max-width: 60%;
      border: 1px solid #4c6ea2;
      border-radius: 8px;
      background: #0f203d;
      color: #fff;
      padding: 8px 10px;
      font-size: 1rem;
      margin: 0 6px;
    }
    .check-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #072a3b;
    }
    .msg { margin-top: 8px; min-height: 20px; font-size: 0.9rem; }
    .msg.ok { color: var(--ok); }
    .msg.bad { color: var(--bad); }
    .assist-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .assist-btn {
      border: 1px solid #4c6ea2;
      border-radius: 8px;
      background: #1a2d4b;
      color: #cfe3ff;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 0.84rem;
    }
    .hidden { display: none !important; }
    .pack-choice {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .pack-card {
      border: 1px solid #4a6898;
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      background: rgba(56, 189, 248, 0.08);
      padding: 10px 12px;
      color: #d8e7ff;
      cursor: pointer;
      text-align: left;
    }
    .pack-card b { display: block; margin-bottom: 3px; color: #eef6ff; }
    .pack-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }
    .pack-check input {
      margin-top: 3px;
      transform: scale(1.08);
      accent-color: var(--accent);
    }
    .continue-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--accent);
      color: #062a3b;
      font-weight: 800;
      cursor: pointer;
      font-size: 1.02rem;
      margin-top: 2px;
    }
    .small-link {
      border: none;
      background: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.82rem;
      margin-top: 6px;
      padding: 0;
    }
    .pool-list { color: #d8e7ff; font-size: 0.88rem; line-height: 1.45; padding-left: 18px; }
    .pool-list li { margin-bottom: 4px; }
    .drop-intro p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; }
    .drop-panel { border: 1px solid #3f5f8f; border-radius: 10px; padding: 10px; background: rgba(12, 24, 46, 0.45); margin-bottom: 10px; }
    .drop-play { display: none; }
    .drop-play.on { display: block; }
    .drop-hud { color: #cfe3ff; font-size: 0.9rem; margin-bottom: 10px; }
    .game-scene {
      position: relative;
      overflow: hidden;
      height: min(62vh, 560px);
      min-height: 360px;
      border: 1px solid #334155;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.85);
      margin-bottom: 10px;
    }
    .drop-canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      padding: 12px;
    }
    .drop-card {
      position: absolute;
      max-width: 98%;
      color: #f8fafc;
      font-size: 13px;
      line-height: 1.45;
      border: 2px solid #38bdf8;
      border-radius: 16px;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      will-change: transform;
      pointer-events: none;
      font-weight: 700;
      word-break: break-word;
      text-align: left;
    }
    .drop-card b { color: #fff; letter-spacing: 0.02em; }
    .drop-footer {
      position: relative;
      padding: 10px 12px 10px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(1px);
    }
    .drop-input-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .drop-input { width: 100%; border: 1px solid #4c6ea2; border-radius: 9px; background: #0f203d; color: #fff; padding: 10px 12px; font-size: 1rem; }
    .drop-dk-btn {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #233959;
      color: #d9e9ff;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .drop-big { display: none; margin-top: 10px; padding: 14px 16px; border-radius: 12px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(74, 222, 128, 0.45); text-align: center; }
    .drop-big.on { display: block; }
    .drop-big-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #4ade80; margin-bottom: 8px; }
    .drop-big-answer { font-size: clamp(1.35rem, 4.5vw, 2.25rem); font-weight: 800; line-height: 1.2; color: #4ade80; word-break: break-word; }
    .drop-note { min-height: 18px; font-size: 0.84rem; margin-top: 7px; }
    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(11, 45, 26, 0.96);
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .drop-overlay.on { display: flex; }
    .drop-overlay-box {
      width: min(96vw, 900px);
      border: 1px solid rgba(74, 222, 128, 0.65);
      border-radius: 16px;
      background: rgba(8, 33, 19, 0.92);
      padding: 20px;
    }
    .drop-overlay-label {
      color: #86efac;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .drop-overlay-answer {
      color: #4ade80;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
      margin-bottom: 14px;
    }
    .drop-overlay-sub {
      color: #d1fae5;
      font-size: 1rem;
      margin-bottom: 14px;
    }
    .cards-box {
      border: 1px solid #334a72;
      border-radius: 14px;
      padding: 14px;
      background: rgba(13, 26, 50, 0.5);
    }
    .cards-title { font-size: 1.9rem; font-weight: 800; margin-bottom: 6px; }
    .cards-subtitle { color: #d2e2ff; font-size: 1.12rem; margin-bottom: 12px; }
    .cards-hud {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .cards-scene {
      position: relative;
      perspective: 1000px;
      border: 1px solid #334155;
      border-radius: 24px;
      min-height: 380px;
      width: min(100%, 640px);
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.85);
      overflow: hidden;
      cursor: pointer;
      outline: none;
      box-shadow: 0 12px 28px rgba(2, 10, 28, 0.45);
    }
    .cards-scene:focus-visible { box-shadow: 0 0 0 2px var(--accent); }
    .cards-inner {
      position: relative;
      width: 100%;
      min-height: 380px;
      transform-style: preserve-3d;
      transition: transform 0.48s ease;
    }
    .cards-inner.flipped { transform: rotateY(180deg); }
    .cards-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 24px 22px;
      backface-visibility: hidden;
      text-align: center;
    }
    .cards-front { background: linear-gradient(135deg, rgba(30,41,59,0.92), rgba(15,23,42,0.92)); }
    .cards-back { background: linear-gradient(135deg, rgba(15,23,42,0.92), rgba(17,30,58,0.92)); transform: rotateY(180deg); }
    .cards-kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      font-weight: 700;
    }
    .cards-def, .cards-answer {
      font-size: clamp(1.55rem, 2.8vw, 2.1rem);
      line-height: 1.45;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
    }
    .cards-speaker {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .cards-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #4b658f;
      padding: 4px 10px;
      font-size: 0.76rem;
      width: fit-content;
    }
    .cards-pill.know { color: #bbf7d0; border-color: #22c55e; background: rgba(34,197,94,0.15); }
    .cards-pill.learn { color: #fecaca; border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .cards-pill.none { color: #cbd5e1; border-color: #64748b; background: rgba(100,116,139,0.15); }
    .cards-hint { margin-top: 10px; color: var(--muted); font-size: 0.82rem; }
    .cards-nav, .cards-mark-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .cards-btn {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #334155;
      color: #cfe3ff;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .cards-btn.know {
      border: none;
      background: linear-gradient(135deg, #15803d, #22c55e);
      color: #ecfdf5;
    }
    .cards-btn:disabled { opacity: 0.6; cursor: default; }
    .mini-game-box {
      border: 1px solid #3b567f;
      border-radius: 12px;
      padding: 12px;
      background: rgba(13, 26, 50, 0.45);
    }
    .mini-hud { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
    .mini-title { font-size: 1.2rem; margin-bottom: 8px; }
    .mini-hint {
      border: 1px solid #3e5f8f;
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px;
      background: rgba(56, 189, 248, 0.08);
      margin-bottom: 10px;
      line-height: 1.45;
    }
    .pick-options { display: grid; grid-template-columns: 1fr; gap: 8px; }
    #pickHint {
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 72px;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .pick-option {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #172a48;
      color: #e5f0ff;
      padding: 10px 12px;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .pick-option.good { border-color: #22c55e; background: rgba(34,197,94,0.18); }
    .pick-option.bad { border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .express-card {
      border: 1px solid #365784;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(10, 28, 58, 0.95), rgba(8, 20, 40, 0.92));
      padding: 18px 16px;
      margin-bottom: 10px;
      line-height: 1.5;
      min-height: 170px;
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.2), 0 10px 24px rgba(2, 10, 28, 0.35);
    }
    #expressMode {
      color: #8fd8ff;
      font-size: 0.95rem;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .express-answer-lock {
      margin-top: 12px;
      border: 1px solid rgba(74, 222, 128, 0.45);
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.12);
      padding: 12px 14px;
    }
    .express-answer-lock .lab {
      display: block;
      color: #86efac;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .express-answer-lock .ans {
      color: #4ade80;
      font-weight: 800;
      font-size: 1.2rem;
      line-height: 1.2;
    }
    .echo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; justify-content: center; }
    .echo-btn {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #1a2d4b;
      color: #cfe3ff;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .echo-input {
      width: 100%;
      border: 1px solid #4c6ea2;
      border-radius: 9px;
      background: #0f203d;
      color: #fff;
      padding: 10px 12px;
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .echo-reveal {
      display: none;
      margin-top: 10px;
      border: 1px solid rgba(74, 222, 128, 0.45);
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.12);
      padding: 10px 12px;
      color: #d1fae5;
      line-height: 1.45;
    }
    .echo-reveal.on { display: block; }
    .echo-reveal b { color: #4ade80; }
    .match-box {
      border: 1px solid #3b567f;
      border-radius: 12px;
      padding: 12px;
      background: rgba(13, 26, 50, 0.45);
    }
    .match-hud {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 10px;
    }
    .match-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .match-card {
      border: 1px solid #4c6ea2;
      border-radius: 12px;
      background: #172a48;
      color: #e5f0ff;
      padding: 10px 12px;
      text-align: left;
      font-size: 0.93rem;
      line-height: 1.4;
      min-height: 86px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .match-card:hover { transform: translateY(-1px); }
    .match-card.sel { border-color: #56ccf2; box-shadow: 0 0 0 1px #56ccf2; }
    .match-card.bad { border-color: #ef4444; background: rgba(239, 68, 68, 0.16); }
    .match-card.ok { border-color: #22c55e; background: rgba(34, 197, 94, 0.18); opacity: 0.75; cursor: default; }
    .match-intro { border: 1px solid #3f5f8f; border-radius: 10px; padding: 10px; background: rgba(12,24,46,0.45); margin-bottom: 10px; }
    .match-play { display: none; }
    .match-play.on { display: block; }
    .wb-shell { display: grid; gap: 10px; }
    .wb-repeat-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .wb-repeat-btn {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #1a2d4b;
      color: #d7e8ff;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }
    .wb-repeat-btn.active { border-color: #56ccf2; box-shadow: 0 0 0 1px #56ccf2 inset; }
    .wb-sort {
      border: 1px solid #4c6ea2;
      border-radius: 10px;
      background: #1a2d4b;
      color: #d7e8ff;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .wb-themes { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .wb-theme-btn {
      border: 1px solid #4c6ea2;
      border-radius: 12px;
      background: #1a2d4b;
      color: #d7e8ff;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
    }
    .wb-theme-btn.active {
      border-color: #56ccf2;
      box-shadow: 0 0 0 1px #56ccf2 inset;
      background: linear-gradient(180deg, #1f3a61 0%, #17304f 100%);
    }
    .wb-stats {
      border: 1px solid #3e5f8f;
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px;
      background: rgba(56, 189, 248, 0.08);
      font-size: 0.9rem;
      color: #dce9ff;
    }
    .wb-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .wb-item {
      border: 1px solid #395781;
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(12, 23, 44, 0.88);
    }
    .wb-item .phrase { font-weight: 700; color: #f1f7ff; line-height: 1.4; }
    .wb-item .hint { color: var(--muted); font-size: 0.86rem; margin-top: 4px; }
    .wb-item .meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .wb-item .status { color: #8fd8ff; font-size: 0.8rem; font-weight: 700; }
    .wb-item .act { display: flex; gap: 6px; }
    .wb-mark-btn {
      border: 1px solid #4c6ea2;
      border-radius: 8px;
      background: #1a2d4b;
      color: #d7e8ff;
      padding: 6px 9px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;

  <script>
    const scoreKey = "masteringB2Score";
    function getScore() {
      const raw = localStorage.getItem(scoreKey);
      const n = Number(raw);
      return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
    }
    function addScore(pts) {
      localStorage.setItem(scoreKey, String(getScore() + pts));
    }

    function normalizeToken(t) {
      return String(t).replace(/^[^A-Za-z0-9']+|[^A-Za-z0-9']+$/g, "");
    }

    function normalizeForCheck(text) {
      return String(text)
        .toLowerCase()
        .replace(/[^a-z0-9'\s-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function mk(phrase, hint) {
      const words = String(phrase).trim().split(/\s+/).filter(Boolean);
      const cleanWords = words.map(normalizeToken);
      const stop = new Set([
        "a","an","the","and","or","of","to","in","on","for","with","at","by","from",
        "is","are","was","were","be","been","being","that","this","these","those",
        "my","your","our","their","any","all","so","as","it","its","it's","i","we",
        "you","they","he","she","them","us","me"
      ]);

      function scoreWindow(start, len) {
        const slice = words.slice(start, start + len);
        let score = 0;
        for (let i = 0; i < slice.length; i += 1) {
          const w = slice[i].toLowerCase().replace(/[^a-z0-9'-]/g, "");
          if (!w) continue;
          if (!stop.has(w)) score += 2;
          if (w.length >= 7) score += 1;
        }
        return score;
      }

      let bestStart = 0;
      let bestLen = Math.min(words.length, words.length >= 8 ? 3 : 2);
      let bestScore = -1;
      const lens = words.length <= 3 ? [words.length] : [3, 2];
      for (let li = 0; li < lens.length; li += 1) {
        const len = lens[li];
        if (len <= 0 || len > words.length) continue;
        for (let s = 0; s <= words.length - len; s += 1) {
          const sc = scoreWindow(s, len);
          if (sc > bestScore) {
            bestScore = sc;
            bestStart = s;
            bestLen = len;
          }
        }
      }

      const chunk = cleanWords.slice(bestStart, bestStart + bestLen).join(" ");
      const pre = (bestStart > 0 ? words.slice(0, bestStart).join(" ") : "Phrase:") + " ";
      const postWords = words.slice(bestStart + bestLen);
      const post = postWords.length ? " " + postWords.join(" ") : "";
      return {
        hint: (hint || phrase),
        pre,
        answer: chunk,
        post
      };
    }
    function fullPhraseFromItem(it) {
      if (it && it.phrase && String(it.phrase).trim()) return String(it.phrase).trim();
      const left = String(it.pre || "").replace(/^Phrase:\s*/i, "").trim();
      const mid = String(it.answer || "").trim();
      const right = String(it.post || "").trim();
      return [left, mid, right].filter(Boolean).join(" ").replace(/\s+/g, " ").trim();
    }
    /** Full key phrase as in the text (Word Bank, cards back, echo, pick options). */
    function fullAnswerOf(it) {
      return fullPhraseFromItem(it) || String(it.answer || "").trim();
    }
    /** Typed gap: one sticky keyword when present, else trainer gap chunk. */
    function typedGapAnswer(it) {
      const st = it && it.stickyAnswer != null ? String(it.stickyAnswer).trim() : "";
      if (st) return st;
      return String((it && it.answer) || "").trim();
    }
    function trainerUsesSticky(it) {
      return !!(it && it.stickyBefore != null && String(it.stickyAnswer || "").trim());

    function cardsSaveMarks() {
      localStorage.setItem(CARDS_MARKS_KEY, JSON.stringify(cardsMarks));
    }
    function cardsGetMarkText(id) {
      return cardsMarks[id] === "know" ? "I know this" : cardsMarks[id] === "learn" ? "Still learning" : "Not marked";
    }
    function cardsGetMarkClass(id) {
      return cardsMarks[id] === "know" ? "know" : cardsMarks[id] === "learn" ? "learn" : "none";
    }
    function cardsActiveDeck() {
      const t = miniThemeFlags();
      return cardsDeck.filter((c) => {
        if (c.id.startsWith("N::")) return t.naomi;
        if (c.id.startsWith("R::")) return t.l121;

    function cardsRender() {
      const hud = document.getElementById("cardsHud");

        hud.innerHTML = "Tick at least one <b>Reading theme</b> above (Naomi / Restaurants / Going vegan). No cards match the current selection.";
        def.textContent = "";
        ans.textContent = "";
        sp.textContent = "";
        frontP.textContent = "";
        backP.textContent = "";
        frontP.className = "cards-pill none";
        backP.className = "cards-pill none";

      }
      if (cardsIdx >= deck.length) cardsIdx = 0;

      const knowCount = deck.filter(x => cardsMarks[x.id] === "know").length;

      const notMarked = deck.length - knowCount - learnCount;
      hud.innerHTML = "Card <b>" + (cardsIdx + 1) + " / " + deck.length + "</b> · I know: <b style='color:#38bdf8'>" + knowCount + "</b> · Still learning: <b style='color:#38bdf8'>" + learnCount + "</b> · Not marked: <b style='color:#38bdf8'>" + notMarked + "</b>";
      def.textContent = c.def;

    function cardsMark(mark) {
      const deck = cardsActiveDeck();
      if (!deck.length) return;
      const id = deck[cardsIdx].id;
      cardsMarks[id] = mark;
      cardsSaveMarks();
      if (mark === "know") srsMarkKnow(id);
      if (mark === "learn") srsMarkLearning(id);
      cardsRender();
    }
    let WB_THEME = "naomi";
    let WB_FILTER = "all";
    let WB_SORT = "dueFirst";
    const SRS_KEY = "masteringB2Unit12Srs";
    let srsState = {};
    function srsLoad() {
      try {
        const raw = localStorage.getItem(SRS_KEY);
        srsState = raw ? JSON.parse(raw) : {};
      } catch (_) {
        srsState = {};
      }
    }
    function srsSave() { localStorage.setItem(SRS_KEY, JSON.stringify(srsState)); }
    function srsGet(id) { return srsState[id] || { streak: 0, intervalDays: 0, nextAt: 0 }; }
    function srsDueNow(id) { const r = srsGet(id); return !r.nextAt || r.nextAt <= Date.now(); }
    function srsLabel(id) {
      const r = srsGet(id);
      if (!r.nextAt || r.nextAt <= Date.now()) return "Due now";
      const days = Math.ceil((r.nextAt - Date.now()) / 86400000);
      return "Next review in " + days + "d";
    }
    function srsMarkKnow(id) {
      const seq = [1, 2, 4, 7, 14, 30];
      const r = srsGet(id);
      const streak = Math.min(seq.length, (r.streak || 0) + 1);
      const intervalDays = seq[streak - 1];
      srsState[id] = { streak, intervalDays, nextAt: Date.now() + intervalDays * 86400000 };
      srsSave();
    }
    function srsMarkLearning(id) {
      srsState[id] = { streak: 0, intervalDays: 0, nextAt: Date.now() };
      srsSave();
    }
    function srsReset(id) {
      delete srsState[id];
      srsSave();
    }
    function wordBankData(theme) {
      if (theme === "vegan") {
        return TRAINER.vegan.flatMap((block) =>
          block.items.map((it, idx) => ({
            id: "G::" + block.name + "::" + idx,
            phrase: fullAnswerOf(it),
            hint: it.hint
          }))
        );
      }
      const src = theme === "naomi" ? TRAINER.naomi : TRAINER.l121;
      const prefix = theme === "naomi" ? "N::" : "R::";
      return src.flatMap((block) =>
        block.items.map((it) => ({
          id: prefix + block.name + "::" + it.answer,
          phrase: fullAnswerOf(it),
          hint: it.hint
        }))
      );
    }
    const WORD_INDEX = {};
    function wbIndexKey(phrase, hint) {
      return normalizeForCheck(phrase) + "||" + normalizeForCheck(hint || "");
    }
    function buildWordIndex() {
      const all = [...wordBankData("naomi"), ...wordBankData("l121"), ...wordBankData("vegan")];
      for (let i = 0; i < all.length; i += 1) {
        const x = all[i];
        WORD_INDEX[wbIndexKey(x.phrase, x.hint)] = x.id;
      }
    }
    function registerGameResult(phrase, hint, ok) {
      const id = WORD_INDEX[wbIndexKey(phrase, hint)];
      if (!id) return;
      cardsMarks[id] = ok ? "know" : "learn";
      cardsSaveMarks();
      if (ok) srsMarkKnow(id);
      else srsMarkLearning(id);
    }
    function wordBankRender() {
      const list = document.getElementById("wbList");
      const stats = document.getElementById("wbStats");
      const search = document.getElementById("wbSearch");
      if (!list || !stats || !search) return;
      document.querySelectorAll(".wb-theme-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.getAttribute("data-wb-theme") === WB_THEME);
      });
      const all = wordBankData(WB_THEME);
      const q = normalizeForCheck(search.value || "");
      const base = WB_FILTER === "due" ? all.filter((x) => srsDueNow(x.id)) : all;
      const searched = q ? base.filter((x) => normalizeForCheck(x.phrase + " " + x.hint).includes(q)) : base;
      const filtered = searched.slice().sort((a, b) => {
        if (WB_SORT === "alpha") return a.phrase.localeCompare(b.phrase);
        const ad = srsDueNow(a.id) ? 0 : 1;
        const bd = srsDueNow(b.id) ? 0 : 1;
        if (ad !== bd) return ad - bd;
        return a.phrase.localeCompare(b.phrase);
      });
      const know = filtered.filter(x => cardsMarks[x.id] === "know").length;
      const learn = filtered.filter(x => cardsMarks[x.id] === "learn").length;
      const rest = filtered.length - know - learn;
      const due = all.filter((x) => srsDueNow(x.id)).length;
      document.querySelectorAll(".wb-repeat-btn").forEach((b) => {
        b.classList.toggle("active", b.getAttribute("data-wb-filter") === WB_FILTER);
      });
      const themeLabel = WB_THEME === "naomi" ? "Naomi" : WB_THEME === "vegan" ? "Going vegan" : "Restaurants";
      stats.textContent = "Theme: " + themeLabel + " · Total: " + filtered.length + " · Due now: " + due + " · I know: " + know + " · Learning: " + learn + " · Unmarked: " + rest + " · Unlimited practice enabled.";
      list.innerHTML = filtered.map((x) => {
        const mark = cardsMarks[x.id] || "";
        const markTxt = mark === "know" ? "I know" : mark === "learn" ? "Learning" : "Unmarked";
        return `<li class="wb-item">
          <div class="phrase">${escapeHtml(x.phrase)}</div>
          <div class="hint">${escapeHtml(x.hint)}</div>
          <div class="meta">
            <span class="status">${markTxt} · ${srsLabel(x.id)}</span>
            <div class="act">
              <button class="wb-mark-btn know" type="button" data-wb-mark="know" data-wb-id="${escapeHtml(x.id)}">Know</button>
              <button class="wb-mark-btn learn" type="button" data-wb-mark="learn" data-wb-id="${escapeHtml(x.id)}">Learning</button>
              <button class="wb-mark-btn reset" type="button" data-wb-mark="reset" data-wb-id="${escapeHtml(x.id)}">Reset</button>
            </div>
          </div>
        </li>`;
      }).join("") || "<li class='wb-item'>No matches.</li>";
    }
    cardsLoadMarks();
    srsLoad();
    buildWordIndex();
    cardsRender();

    // Paraphrase pick logic
    const PICK = { q: [], i: 0, score: 0, done: false };
    function pickBuildRound() {
      const all = itemsForMiniGames();
      PICK.q = shuffle(all).slice(0, 10).map((it) => {
        const target = fullAnswerOf(it);
        const distractors = shuffle(all.filter(x => fullAnswerOf(x) !== target)).slice(0, 3).map(x => fullAnswerOf(x));
        const options = shuffle([target, ...distractors]);
        return { hint: it.hint, answer: target, options };
      });
      PICK.i = 0; PICK.score = 0; PICK.done = false;
    }
    function pickRender() {
      const hud = document.getElementById("pickHud");
      const hint = document.getElementById("pickHint");
      const opts = document.getElementById("pickOptions");
      const msg = document.getElementById("pickMsg");
      if (!hud || !hint || !opts || !msg) return;
      if (!PICK.q.length) pickBuildRound();
      if (PICK.i >= PICK.q.length) {
        hud.textContent = "Complete · Score: " + PICK.score + " / " + PICK.q.length;
        hint.textContent = "Round finished. Reopen folder to replay.";
        opts.innerHTML = "";
        return;
      }
      const cur = PICK.q[PICK.i];
      hud.textContent = (PICK.i + 1) + " / " + PICK.q.length + " · Score: " + PICK.score;
      hint.textContent = cur.hint;
      opts.innerHTML = cur.options.map((op) => `<button class="pick-option" data-op="${escapeHtml(op)}" type="button">${escapeHtml(op)}</button>`).join("");
      msg.textContent = "";
      msg.className = "msg";
    }
    function pickChoose(answer) {
      if (PICK.i >= PICK.q.length) return;
      const cur = PICK.q[PICK.i];
      const msg = document.getElementById("pickMsg");
      const allBtns = Array.from(document.querySelectorAll("#pickOptions .pick-option"));
      allBtns.forEach((b) => {
        const txt = b.getAttribute("data-op") || "";
        if (normalizeForCheck(txt) === normalizeForCheck(cur.answer)) b.classList.add("good");
        if (normalizeForCheck(txt) === normalizeForCheck(answer) && normalizeForCheck(answer) !== normalizeForCheck(cur.answer)) b.classList.add("bad");
        b.disabled = true;
      });
      if (normalizeForCheck(answer) === normalizeForCheck(cur.answer)) {
        PICK.score += 1;
        addScore(1);
        registerGameResult(cur.answer, cur.hint, true);
        msg.textContent = "Correct! +1";
        msg.className = "msg ok";
      } else {
        registerGameResult(cur.answer, cur.hint, false);
        msg.textContent = "Incorrect. Correct: " + cur.answer;
        msg.className = "msg bad";
      }
      PICK.i += 1;
      setTimeout(pickRender, 500);
    }

    // 60-second express logic
    const EXPRESS = { deck: [], i: 0, score: 0, endAt: 0, timer: 0, revealAnswer: false };
    function expressBuild() {
      EXPRESS.deck = shuffle(itemsForMiniGames()).slice(0, 24).map((it, idx) => ({
        type: idx % 2 === 0 ? "paraphrase" : "gap",
        item: { ...it, full: fullAnswerOf(it) }
      }));
      EXPRESS.i = 0; EXPRESS.score = 0; EXPRESS.endAt = Date.now() + 60000; EXPRESS.revealAnswer = false;
    }
    function expressRender() {
      const hud = document.getElementById("expressHud");
      const card = document.getElementById("expressCard");
      const msg = document.getElementById("expressMsg");
      const mode = document.getElementById("expressMode");
      if (!hud || !card || !msg || !mode) return;
      if (!EXPRESS.deck.length) expressBuild();
      const left = Math.max(0, Math.ceil((EXPRESS.endAt - Date.now()) / 1000));
      hud.textContent = "Time: " + left + "s · Score: " + EXPRESS.score;
      if (left <= 0 || EXPRESS.i >= EXPRESS.deck.length) {
        card.textContent = "Time is up. Final score: " + EXPRESS.score;
        mode.textContent = "Round complete.";
        return;
      }
      const cur = EXPRESS.deck[EXPRESS.i];
      let body = "";
      if (cur.type === "paraphrase") {
        mode.textContent = "Mode: Paraphrase";
        body = "<b>Paraphrase:</b> " + escapeHtml(cur.item.hint);
      } else {
        mode.textContent = "Mode: Phrase recall";
        body = "<b>From text block:</b> " + escapeHtml(cur.item.full);
      }
      if (EXPRESS.revealAnswer) {
        body += `<div class="express-answer-lock"><span class="lab">From the text</span><span class="ans">${escapeHtml(cur.item.full)}</span></div>`;
      }
      card.innerHTML = body;
      msg.textContent = "";
      msg.className = "msg";
    }
    function expressStartTimer() {
      if (EXPRESS.timer) clearInterval(EXPRESS.timer);
      EXPRESS.timer = setInterval(expressRender, 400);
    }
    function expressNext() {
      EXPRESS.i += 1;
      EXPRESS.revealAnswer = false;
      expressRender();
    }

    // Echo run logic
    const ECHO = { q: [], i: 0, score: 0, reveal: false };
    function echoBuild() {
      ECHO.q = shuffle(
        itemsForMiniGames().map((it) => ({
          hint: it.hint,
          answer: fullAnswerOf(it)
        }))
      ).slice(0, 10);
      ECHO.i = 0; ECHO.score = 0; ECHO.reveal = false;
    }
    function echoRender() {
      const hud = document.getElementById("echoHud");
      const msg = document.getElementById("echoMsg");
      const inp = document.getElementById("echoInput");
      const checkBtn = document.getElementById("echoCheckBtn");
      const nextBtn = document.getElementById("echoNextBtn");
      const reveal = document.getElementById("echoReveal");
      if (!hud || !msg || !inp || !checkBtn || !nextBtn || !reveal) return;
      if (!ECHO.q.length) echoBuild();
      if (ECHO.i >= ECHO.q.length) {
        hud.textContent = "Complete · Score: " + ECHO.score + " / " + ECHO.q.length;
        msg.textContent = "Round complete.";

      }
      hud.textContent = (ECHO.i + 1) + " / " + ECHO.q.length + " · Score: " + ECHO.score + " · In queue: " + (ECHO.q.length - ECHO.i);
      if (!ECHO.reveal) {

        msg.textContent = "";
        msg.className = "msg";

      }
      checkBtn.style.display = ECHO.reveal ? "none" : "block";
      nextBtn.style.display = ECHO.reveal ? "inline-block" : "none";
    }
    function echoSpeakCurrent() {
      if (ECHO.i >= ECHO.q.length) return;
      const txt = ECHO.q[ECHO.i].answer;
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(txt);
      u.lang = "en-GB";
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    // Pair Blitz logic
    const MATCH = { pairs: [], pairTotal: 0, donePairs: 0, queueIdx: 0, cards: [], selected: [], startTs: 0, active: false };
    function matchShuffleNoAdj(cards) {
      for (let tries = 0; tries < 40; tries += 1) {
        const out = shuffle(cards);
        let bad = false;
        for (let i = 0; i < out.length - 1; i += 1) {
          if (out[i].pairId === out[i + 1].pairId) { bad = true; break; }
        }
        if (!bad) return out;
      }
      return shuffle(cards);
    }
    function matchBuildDeck(useNaomi, useL121, useVegan) {
      let all = [];
      if (useNaomi) all = all.concat(TRAINER.naomi.flatMap(s => s.items));
      if (useL121) all = all.concat(TRAINER.l121.flatMap(s => s.items));
      if (useVegan) all = all.concat(TRAINER.vegan.flatMap(s => s.items));
      MATCH.pairs = shuffle(all).slice(0, 10).map((it) => ({ syn: it.hint, ans: fullAnswerOf(it) }));
      MATCH.pairTotal = MATCH.pairs.length;
      MATCH.donePairs = 0;
      MATCH.queueIdx = 0;
      MATCH.cards = [];
      MATCH.selected = [];
      MATCH.startTs = Date.now();
      MATCH.active = true;
      matchLoadGrid();
    }
    function matchLoadGrid() {
      const chunk = MATCH.pairs.slice(MATCH.queueIdx, MATCH.queueIdx + 6);
      MATCH.queueIdx += chunk.length;
      const cards = [];
      for (let i = 0; i < chunk.length; i += 1) {
        cards.push({ id: "s" + i, pairId: i, side: "syn", text: chunk[i].syn, state: "" });
        cards.push({ id: "a" + i, pairId: i, side: "ans", text: chunk[i].ans, state: "" });
      }
      MATCH.cards = matchShuffleNoAdj(cards);
      MATCH.selected = [];
      matchRender();
    }
    function matchRender() {
      const hud = document.getElementById("matchHud");
      const grid = document.getElementById("matchGrid");
      const msg = document.getElementById("matchMsg");
      if (!hud || !grid || !msg) return;
      if (!MATCH.active) return;
      const sec = Math.max(0, Math.floor((Date.now() - MATCH.startTs) / 1000));
      const left = MATCH.pairTotal - MATCH.donePairs;
      hud.innerHTML = `<span>Time: <b>${sec}</b>s</span><span>Pairs left: <b>${left}</b></span><span>Done: <b>${MATCH.donePairs}</b> / ${MATCH.pairTotal}</span>`;
      grid.innerHTML = MATCH.cards.map((c, idx) => {
        const cls = ["match-card", c.state || ""].join(" ").trim();
        const jitX = ((idx % 3) - 1) * 2;
        const jitY = ((idx % 4) - 1.5) * 1.5;
        const rot = ((idx % 5) - 2) * 0.4;
        return `<button type="button" class="${cls}" data-mid="${c.id}" style="transform:translate(${jitX}px, ${jitY}px) rotate(${rot}deg);">${escapeHtml(c.text)}</button>`;
      }).join("");
      if (left <= 0) {
        msg.textContent = "ты молодец, ты все запомнил из этой папки";
        msg.className = "msg ok";
      } else {
        msg.textContent = "";
        msg.className = "msg";
      }
    }
    function matchTap(id) {
      const card = MATCH.cards.find(c => c.id === id);
      if (!card || card.state === "ok" || card.state === "bad") return;
      if (MATCH.selected.includes(id)) return;
      card.state = "sel";
      MATCH.selected.push(id);
      matchRender();
      if (MATCH.selected.length < 2) return;
      const a = MATCH.cards.find(c => c.id === MATCH.selected[0]);
      const b = MATCH.cards.find(c => c.id === MATCH.selected[1]);
      if (!a || !b) return;
      const ok = a.pairId === b.pairId && a.side !== b.side;
      if (ok) {
        a.state = "ok"; b.state = "ok";
        MATCH.donePairs += 1;
        addScore(1);
        registerGameResult(a.side === "ans" ? a.text : b.text, a.side === "syn" ? a.text : b.text, true);
        MATCH.selected = [];
        setTimeout(() => {
          MATCH.cards = MATCH.cards.filter(c => c.state !== "ok");
          if (MATCH.cards.length === 0 && MATCH.donePairs < MATCH.pairTotal) matchLoadGrid();
          else matchRender();
        }, 220);
      } else {
        a.state = "bad"; b.state = "bad";
        MATCH.selected = [];
        setTimeout(() => {
          if (a.state === "bad") a.state = "";
          if (b.state === "bad") b.state = "";
          matchRender();
        }, 300);
      }
    }

    // Trainer logic
    let trainerActive = false;
    let trainerPackFlags = { naomi: true, l121: false, vegan: false };
    let activeSpeakers = [];
    let speaker = 0;
    let item = 0;
    let lives = 3;
    let sessionPoints = 0;

    function currentItems() { return activeSpeakers[speaker].items; }
    function current() { return currentItems()[item]; }

    function buildActiveSpeakers() {
      const { naomi: uN, l121: uL, vegan: uV } = trainerPackFlags;
      activeSpeakers = [];
      if (uN) activeSpeakers.push(...TRAINER.naomi.map((s) => ({ name: "N " + s.name, items: s.items.slice() })));
      if (uL) activeSpeakers.push(...TRAINER.l121.map((s) => ({ name: s.name, items: s.items.slice() })));
      if (uV) activeSpeakers.push(...TRAINER.vegan.map((s) => ({ name: "Vegan · " + s.name, items: s.items.slice() })));
    }

    function updatePackSummary() {
      const el = document.getElementById("packSummary");
      if (!el) return;
      const bits = [];
      if (trainerPackFlags.naomi) bits.push("Naomi");
      if (trainerPackFlags.l121) bits.push("Listening 12.1");
      if (trainerPackFlags.vegan) bits.push("Going vegan");
      el.textContent = "Pack: " + (bits.join(" + ") || "—");
    }

    function renderTabs() {
      const tabs = document.getElementById("speakerTabs");
      tabs.innerHTML = activeSpeakers.map((s, i) => `<button class="tab ${i===speaker?"active":""}" data-sp="${i}" type="button">${s.name}</button>`).join("");
      tabs.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          speaker = Number(btn.getAttribute("data-sp"));
          item = 0; lives = 3; renderTrainer();
        });
      });
    }

    function renderTrainer() {
      document.getElementById("homeScore").textContent = String(getScore());
      document.getElementById("sessionScore").textContent = String(sessionPoints);
      const chooser = document.getElementById("packChoice");
      const play = document.getElementById("trainerPlay");
      if (!trainerActive) {
        chooser.classList.remove("hidden");
        play.classList.add("hidden");
        return;
      }
      chooser.classList.add("hidden");
      play.classList.remove("hidden");
      updatePackSummary();
      const c = current();
      document.getElementById("lives").textContent = "❤".repeat(lives) + "♡".repeat(Math.max(0,3-lives));
      document.getElementById("counter").textContent = (item + 1) + " / " + currentItems().length;
      document.getElementById("hintBox").textContent = c.hint;
      document.getElementById("linePre").textContent = trainerPre(c);
      document.getElementById("linePost").textContent = trainerPost(c);
      document.getElementById("answerInput").value = "";
      document.getElementById("msg").textContent = "";
      document.getElementById("msg").className = "msg";
      renderTabs();
    }

    function nextItem() {
      if (item < currentItems().length - 1) {
        item += 1;
      } else {
        item = 0;
        speaker = (speaker + 1) % activeSpeakers.length;
      }
    }

    function handleCheck() {
      const inp = document.getElementById("answerInput");
      const msg = document.getElementById("msg");
      const cur = current();
      const expectedRaw = typedGapAnswer(cur);
      const expected = normalizeForCheck(expectedRaw);
      const got = normalizeForCheck(inp.value);
      if (!got) {
        msg.textContent = "Incorrect: empty answer. Type the missing word or chunk.";
        msg.className = "msg bad";
        return;
      }
      if (got === expected) {
        addScore(1);
        sessionPoints += 1;
        msg.textContent = "Correct! +1 point";
        msg.className = "msg ok";
        nextItem();
        setTimeout(renderTrainer, 450);
      } else {

        if (id && (mark === "know" || mark === "learn" || mark === "reset")) {
          cardsMarks[id] = mark;
          if (mark === "reset") {
            delete cardsMarks[id];
            cardsSaveMarks();
            srsReset(id);
          } else {
            cardsSaveMarks();
            if (mark === "know") srsMarkKnow(id);
            if (mark === "learn") srsMarkLearning(id);
          }
          wordBankRender();
        }
      }
    });
    document.addEventListener("input", (e) => {
      if (e.target && e.target.id === "wbSearch") {
        wordBankRender();
      }
      if (e.target && e.target.id === "wbSort") {
        WB_SORT = e.target.value || "dueFirst";
        wordBankRender();
      }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === " " && document.activeElement && document.activeElement.id === "cardsScene") {
        e.preventDefault();
        cardsFlip();
        return;
      }
      if (e.key === "Enter" && document.activeElement && document.activeElement.id === "dropInput") {
        e.preventDefault();
        dropCheck();
        return;
      }
      if (e.key === "Enter" && document.activeElement && document.activeElement.id === "echoInput") {
        e.preventDefault();
        const btn = document.getElementById("echoCheckBtn");
        if (btn) btn.click();
      }
    });
    pickBuildRound();
    pickRender();
    expressBuild();
    expressRender();
    echoBuild();
    echoRender();
    matchRender();
  </script>
</body>
</html>
