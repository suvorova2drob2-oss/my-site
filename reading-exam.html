<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which person mentions | Exam practice</title>
<link rel="stylesheet" href="reading-exam.css">
</head>
<body>
<div class="wrap">
    <div id="screen-home" class="screen active">
        <h1>The robots are taking over</h1>
        <p class="sub" id="intro-line"></p>
        <div class="mondrian" id="person-grid"></div>
        <div class="summary-all" id="global-summary"></div>
    </div>
    <div id="screen-work" class="screen">
        <div class="btn-bar">
            <button type="button" class="btn btn-ghost" id="btn-back"></button>
        </div>
        <div class="reading-card" id="reading-card"></div>
        <p class="task-title" id="task-instruction"></p>
        <div class="stmt-list" id="stmt-list"></div>
        <div class="btn-bar" style="margin-top:24px;">
            <button type="button" class="btn btn-primary" id="btn-check"></button>
        </div>
    </div>
    <div id="screen-results" class="screen">
        <div class="btn-bar">
            <button type="button" class="btn btn-ghost" id="btn-back2"></button>
            <button type="button" class="btn btn-primary" id="btn-retry"></button>
        </div>
        <div id="results-root"></div>
    </div>
</div>
<script src="reading-exam.js"></script>
</body>
</html>
