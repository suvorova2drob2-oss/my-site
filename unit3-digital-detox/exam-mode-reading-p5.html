<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam mode &mdash; Reading (Part 5 style) &mdash; My digital detox</title>
  <style>
    :root { --bg: #f8fafc; --card: #fff; --line: #cbd5e1; --text: #0f172a; --muted: #64748b; --acc: #4f46e5; --ok: #15803d; --bad: #b91c1c; --soft: #eef2ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; font-size: clamp(1rem, 1.15vw, 1.08rem); line-height: 1.55; }
    .skip { position: absolute; left: -9999px; }
    .wrap { max-width: 52rem; margin: 0 auto; padding: 16px 18px 40px; }
    .top-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 2px solid var(--line); }
    .top-nav a { color: var(--acc); font-weight: 700; text-decoration: none; font-size: 0.92rem; }
    .top-nav a:hover { text-decoration: underline; }
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; }
    .tabs a, .tabs button {
      border: 2px solid var(--line); background: #fff; color: var(--text); padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 0.88rem; cursor: pointer; text-decoration: none; font-family: inherit;
    }
    .tabs button[aria-selected="true"], .tabs a.tab-on { background: var(--acc); color: #fff; border-color: var(--acc); }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; margin-bottom: 18px; box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06); }
    .card h2 { font-size: clamp(1.05rem, 1.8vw, 1.2rem); margin-bottom: 10px; color: #312e81; }
    .task-line { font-size: clamp(0.95rem, 1.4vw, 1.05rem); color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .passage { font-size: clamp(1.02rem, 1.5vw, 1.12rem); line-height: 1.65; color: #1e293b; }
    .passage .part-h { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--acc); font-weight: 800; margin: 1.25em 0 0.5em; }
    .passage p { margin-bottom: 0.75em; }
    .q-item { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid #e2e8f0; }
    .q-item:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    .q-num { font-weight: 800; color: #312e81; margin-bottom: 8px; font-size: 0.95rem; }
    .q-prompt { font-size: clamp(1.05rem, 1.6vw, 1.18rem); font-weight: 600; margin-bottom: 12px; line-height: 1.45; }
    .opts { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border: 2px solid var(--line); border-radius: 10px; cursor: pointer; font-size: clamp(0.98rem, 1.4vw, 1.08rem); line-height: 1.45; transition: border-color 0.15s, background 0.15s;
    }
    .opt:has(input:checked) { border-color: #a5b4fc; background: var(--soft); }
    .opt input { margin-top: 4px; flex-shrink: 0; width: 1.1rem; height: 1.1rem; }
    .opt-label { font-weight: 700; color: var(--acc); width: 1.5rem; flex-shrink: 0; }
    .opt.correct { border-color: var(--ok); background: #f0fdf4; }
    .opt.wrong-pick { border-color: var(--bad); background: #fef2f2; }
    .row-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 8px; }
    .btn {
      font-family: inherit; font-weight: 800; font-size: 0.9rem; padding: 12px 22px; border-radius: 10px; border: none; cursor: pointer;
    }
    .btn-prim { background: var(--acc); color: #fff; }
    .btn-prim:hover { filter: brightness(1.07); }
    .btn-sec { background: #e2e8f0; color: #1e293b; }
    .score { font-size: 1.05rem; font-weight: 700; margin: 10px 0; min-height: 1.5em; }
    .score.ok { color: var(--ok); }
    details.feedback { margin-top: 12px; padding: 12px 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: clamp(0.88rem, 1.2vw, 0.95rem); line-height: 1.55; }
    details.feedback summary { cursor: pointer; font-weight: 800; color: #4338ca; }
    .fb-line { margin: 10px 0 0; padding-top: 8px; border-top: 1px dashed #cbd5e1; }
    .fb-line:first-of-type { border-top: 0; padding-top: 0; }
    .fb-k { font-weight: 800; color: #0f172a; }
    .hub-tabs {
      display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; padding: 0; list-style: none;
    }
    .hub-tabs a {
      display: inline-block; padding: 10px 16px; border-radius: 10px; font-weight: 800; font-size: 0.86rem; text-decoration: none;
      border: 2px solid #cbd5e1; background: #fff; color: #1e293b;
    }
    .hub-tabs a[aria-current="page"] { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .hub-tabs a:hover { border-color: #6366f1; }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <div class="wrap">
    <nav class="hub-tabs" aria-label="My digital detox hub" style="max-width:52rem">
      <a href="index.html">Reading texts &amp; stages</a>
      <a href="exam-mode-reading-p5.html" aria-current="page">Exam mode (Part 5)</a>
      <a href="lexical-games-app.html">Lexical games</a>
    </nav>
    <header class="top-nav">
      <div class="tabs" role="tablist" aria-label="Exam view">
        <button type="button" role="tab" id="tabText" aria-selected="true" aria-controls="panelText">Text</button>
        <button type="button" role="tab" id="tabQs" aria-selected="false" aria-controls="panelQs">Questions 1&ndash;6</button>
      </div>
      <div>
        <a href="index.html">&larr; Digital detox hub</a> &middot; <a href="../unit3.html">Unit 3</a>
      </div>
    </header>

    <main id="main">
      <div class="panel active" id="panelText" role="tabpanel" aria-labelledby="tabText">
        <div class="card">
          <h2 id="passageTitle">My digital detox</h2>
          <p class="task-line" id="passageBlurb"></p>
          <div class="passage" id="passageRoot" lang="en"></div>
        </div>
      </div>

      <div class="panel" id="panelQs" role="tabpanel" aria-labelledby="tabQs">
        <div class="card">
          <h2>Questions 1&ndash;6</h2>
          <p class="task-line" id="questionBlurb"></p>
          <form id="examForm" autocomplete="off"></form>
          <div class="row-actions">
            <button type="submit" form="examForm" class="btn btn-prim" id="btnSubmit">Submit</button>
            <button type="button" class="btn btn-sec" id="btnReset">Clear</button>
          </div>
          <p class="score" id="scoreLine" aria-live="polite"></p>
        </div>
      </div>
    </main>
  </div>

  <script src="data/u3-reading-part5-exam.js"></script>
  <script>
(function () {
  var DATA = typeof U3_P5_EXAM !== "undefined" ? U3_P5_EXAM : null;
  if (!DATA || !DATA.questions || !DATA.passage) {
    document.getElementById("passageRoot").textContent = "Missing data/u3-reading-part5-exam.js";
    return;
  }
  var LETTERS = ["A", "B", "C", "D"];
  var submitted = false;

  function renderPassage() {
    document.getElementById("passageTitle").textContent = DATA.title || "Reading";
    document.getElementById("passageBlurb").textContent = DATA.blurb || "";
    var root = document.getElementById("passageRoot");
    root.innerHTML = "";
    DATA.passage.forEach(function (blk) {
      var h = document.createElement("div");
      h.className = "part-h";
      h.textContent = "Part " + blk.part;
      root.appendChild(h);
      var wrap = document.createElement("div");
      wrap.innerHTML = blk.html;
      while (wrap.firstChild) root.appendChild(wrap.firstChild);
    });
  }

  function renderQuestions() {
    document.getElementById("questionBlurb").textContent = DATA.blurb || "";
    var form = document.getElementById("examForm");
    form.innerHTML = "";
    DATA.questions.forEach(function (q) {
      var block = document.createElement("div");
      block.className = "q-item";
      block.dataset.qid = String(q.id);
      var num = document.createElement("div");
      num.className = "q-num";
      num.textContent = "Question " + q.id;
      var pr = document.createElement("div");
      pr.className = "q-prompt";
      pr.textContent = q.prompt;
      block.appendChild(num);
      block.appendChild(pr);
      var opts = document.createElement("div");
      opts.className = "opts";
      for (var i = 0; i < 4; i++) {
        var lab = document.createElement("label");
        lab.className = "opt";
        lab.htmlFor = "q" + q.id + "_" + i;
        var inp = document.createElement("input");
        inp.type = "radio";
        inp.name = "q" + q.id;
        inp.id = "q" + q.id + "_" + i;
        inp.value = String(i);
        var L = document.createElement("span");
        L.className = "opt-label";
        L.textContent = LETTERS[i] + ".";
        var tx = document.createElement("span");
        tx.textContent = q.options[i];
        lab.appendChild(inp);
        lab.appendChild(L);
        lab.appendChild(tx);
        opts.appendChild(lab);
      }
      block.appendChild(opts);
      var det = document.createElement("details");
      det.className = "feedback";
      det.id = "fb-" + q.id;
      det.hidden = true;
      var sum = document.createElement("summary");
      sum.textContent = "Distractors & explanation (A–D)";
      det.appendChild(sum);
      ["A", "B", "C", "D"].forEach(function (letter) {
        var d = document.createElement("div");
        d.className = "fb-line";
        d.innerHTML = "<span class=\"fb-k\">" + letter + ".</span> " + (q.why[letter] || "");
        det.appendChild(d);
      });
      block.appendChild(det);
      form.appendChild(block);
    });
  }

  function setTab(which) {
    var tText = document.getElementById("tabText");
    var tQs = document.getElementById("tabQs");
    var pText = document.getElementById("panelText");
    var pQs = document.getElementById("panelQs");
    var onText = which === "text";
    tText.setAttribute("aria-selected", onText ? "true" : "false");
    tQs.setAttribute("aria-selected", onText ? "false" : "true");
    pText.classList.toggle("active", onText);
    pQs.classList.toggle("active", !onText);
  }

  document.getElementById("tabText").addEventListener("click", function () { setTab("text"); });
  document.getElementById("tabQs").addEventListener("click", function () { setTab("qs"); });

  function markForm() {
    submitted = true;
    var ok = 0;
    DATA.questions.forEach(function (q) {
      var sel = document.querySelector("input[name=\"q" + q.id + "\"]:checked");
      var pick = sel ? parseInt(sel.value, 10) : -1;
      if (pick === q.correct) ok += 1;
      for (var i = 0; i < 4; i++) {
        var lab = document.querySelector("label[for=\"q" + q.id + "_" + i + "\"]");
        if (!lab) continue;
        lab.classList.remove("correct", "wrong-pick");
        if (i === q.correct) lab.classList.add("correct");
        else if (pick === i && i !== q.correct) lab.classList.add("wrong-pick");
      }
      var det = document.getElementById("fb-" + q.id);
      if (det) det.hidden = false;
    });
    document.getElementById("scoreLine").textContent = "Score: " + ok + " / " + DATA.questions.length;
    document.getElementById("scoreLine").className = "score " + (ok === DATA.questions.length ? "ok" : "");
    var inputs = document.querySelectorAll("#examForm input[type=radio]");
    inputs.forEach(function (inp) { inp.disabled = true; });
  }

  function resetForm() {
    submitted = false;
    document.getElementById("examForm").reset();
    document.querySelectorAll(".opt").forEach(function (el) { el.classList.remove("correct", "wrong-pick"); });
    document.querySelectorAll("#examForm input[type=radio]").forEach(function (inp) { inp.disabled = false; });
    document.querySelectorAll("details.feedback").forEach(function (d) { d.hidden = true; d.open = false; });
    document.getElementById("scoreLine").textContent = "";
  }

  document.getElementById("examForm").addEventListener("submit", function (e) {
    e.preventDefault();
    markForm();
  });
  document.getElementById("btnReset").addEventListener("click", resetForm);

  renderPassage();
  renderQuestions();
})();
  </script>
  <script src="../js/prep-course-profile.js"></script>
  <script src="../js/prep-site-content.js"></script>
</body>
</html>
