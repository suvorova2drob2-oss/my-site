<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 9 &mdash; Word formation · Adverbs (hearts)</title>
  <style>
    :root {
      --bg: #181e28;
      --bg-card: #1e2530;
      --bg-inner: #252d3a;
      --line: #3a4556;
      --text: #f7f9fc;
      --text-dim: #9eb0c8;
      --pink: #f25176;
      --pink-glow: rgba(242, 81, 118, 0.12);
      --cyan: #4fbbf2;
      --heart-off: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 600px at 50% -20%, #243044 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .shell {
      width: min(560px, 100%);
      background: linear-gradient(165deg, #252e3d 0%, var(--bg-card) 45%, #1a2029 100%);
      border: 1px solid #3d4d63;
      border-radius: 22px;
      padding: 22px 22px 26px;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.22),
        0 24px 56px rgba(0, 0, 0, 0.45);
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 2px 18px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .home {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .home:hover { color: var(--cyan); border-color: #55667d; }
    .home:active { transform: scale(0.97); }
    .home svg { width: 22px; height: 22px; }
    .hearts {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    .heart {
      width: 28px;
      height: 26px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .heart.on {
      filter: drop-shadow(0 2px 1px rgba(180, 40, 80, 0.85)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
    }
    .heart.off {
      opacity: 0.38;
      transform: scale(0.88);
    }
    .heart.off path { fill: var(--heart-off); }
    .heart.on path { fill: url(#heartGrad); }
    .counter {
      font-weight: 700;
      font-size: 1.02rem;
      color: var(--text-dim);
      min-width: 4ch;
      text-align: right;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .stage { text-align: center; }
    .instruction {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .root-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
    .root {
      display: inline-block;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--pink);
      padding: 12px 16px;
      border-radius: 14px;
      border: 2px solid var(--pink);
      background: var(--pink-glow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .sentence {
      font-size: 1.02rem;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 20px;
      text-align: left;
      max-width: 38em;
      margin-left: auto;
      margin-right: auto;
    }
    .sentence .gap-mark {
      color: var(--cyan);
      font-weight: 700;
      border-bottom: 2px dashed rgba(79, 187, 242, 0.45);
    }
    .input-wrap { margin-bottom: 14px; max-width: 100%; }
    .input-wrap input {
      width: 100%;
      padding: 15px 16px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text);
      outline: none;
      text-align: center;
    }
    .input-wrap input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(79, 187, 242, 0.22);
    }
    .input-wrap input.shake {
      animation: shake 0.45s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .feedback {
      min-height: 1.45em;
      font-size: 0.94rem;
      margin-bottom: 12px;
      text-align: center;
    }
    .feedback.bad { color: #ff9aab; }
    .feedback.ok { color: #5ee4a8; }
    .check {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8, 0 8px 24px rgba(79, 187, 242, 0.25);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .check:hover { filter: brightness(1.05); }
    .check:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2a8ab8, 0 4px 16px rgba(79, 187, 242, 0.2);
    }
    .check:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 99998;
    }
    .overlay.open { display: flex; }
    .overlay.wrong-reveal {
      flex-direction: column;
      justify-content: center;
      padding: 32px 20px;
      background: rgba(8, 11, 18, 0.96);
      z-index: 99999;
    }
    .wrong-reveal-box { width: min(520px, 100%); text-align: center; }
    .wrong-reveal-label {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .wrong-reveal-answer {
      font-size: clamp(1.75rem, 8vw, 2.5rem);
      font-weight: 800;
      color: #4ade80;
      line-height: 1.2;
      margin-bottom: 22px;
      padding: 20px 18px;
      border-radius: 18px;
      border: 2px solid rgba(74, 222, 128, 0.55);
      background: rgba(34, 197, 94, 0.14);
      box-shadow:
        0 0 0 1px rgba(74, 222, 128, 0.12),
        0 8px 40px rgba(34, 197, 94, 0.25);
      text-shadow: 0 2px 24px rgba(74, 222, 128, 0.45);
      word-break: break-word;
    }
    .wrong-reveal-tip {
      font-size: 0.94rem;
      color: #cbd5e1;
      margin-bottom: 28px;
      line-height: 1.45;
      font-style: italic;
    }
    .wrong-reveal-next {
      width: 100%;
      max-width: 300px;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8;
    }
    .wrong-reveal-next:hover { filter: brightness(1.06); }
    .modal {
      background: var(--bg-inner);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      max-width: 380px;
      text-align: center;
    }
    .modal h2 { margin-bottom: 10px; font-size: 1.25rem; }
    .modal p { color: var(--text-dim); margin-bottom: 18px; line-height: 1.45; }
    .modal button {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: var(--cyan);
      color: #0a1628;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ff7eb3" />
        <stop offset="100%" style="stop-color:#e8487a" />
      </linearGradient>
    </defs>
  </svg>
  <div class="shell">
    <header class="bar">
      <a class="home" id="homeLink" href="../index.html" aria-label="Back to Use of English Unit 9">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z" />
        </svg>
      </a>
      <div class="hearts" id="hearts" aria-live="polite"></div>
      <div class="counter" id="progress">1/8</div>
    </header>

    <div id="game">
      <div class="stage">
        <p class="instruction">Word formation &middot; Adverbs &middot; 3 lives</p>
        <div class="root-wrap">
          <span class="root" id="rootWord">( ? )</span>
        </div>
        <p class="sentence" id="sentence"></p>
      </div>
      <div class="input-wrap">
        <input type="text" id="answer" autocomplete="off" spellcheck="true" placeholder="Type the adverb" />
      </div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <button type="button" class="check" id="checkBtn">Check</button>
    </div>
  </div>

  <div class="overlay wrong-reveal" id="wrongRevealOverlay" role="dialog" aria-modal="true" aria-labelledby="wrongRevealLabel" aria-hidden="true" style="display: none;">
    <div class="wrong-reveal-box">
      <p class="wrong-reveal-label" id="wrongRevealLabel">Correct answer</p>
      <p class="wrong-reveal-answer" id="wrongRevealAnswer">&mdash;</p>
      <p class="wrong-reveal-tip" id="wrongRevealTip"></p>
      <button type="button" class="wrong-reveal-next" id="wrongRevealNext">Continue</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle" aria-hidden="true">
    <div class="modal">
      <h2 id="winTitle">Round complete</h2>
      <p id="winMsg">All eight adverbs done.</p>
      <button type="button" id="playAgain">Play again</button>
    </div>
  </div>

  <div class="overlay" id="loseOverlay" role="dialog" aria-modal="true" aria-labelledby="loseTitle" aria-hidden="true">
    <div class="modal">
      <h2 id="loseTitle">No hearts left</h2>
      <p>The round restarts from sentence 1.</p>
      <button type="button" id="restartBtn">OK</button>
    </div>
  </div>

  <script>
(function () {
  var ROUND_ITEMS = [
    {
      root: "GENTLE",
      answers: ["gently"],
      tip: "Most -y adjectives add -ly for the manner adverb.",
      sentence:
        'Cover the saucepan and cook <span class="gap-mark">______</span> over a medium heat.'
    },
    {
      root: "ENTHUSIASM",
      answers: ["enthusiastically"],
      tip: "Nouns in -ism often become adverbs in -istically.",
      sentence:
        'The audience applauded <span class="gap-mark">______</span> at the end of the concert.'
    },
    {
      root: "INCREASE",
      answers: ["increasingly"],
      tip: "Drop the verb ending and use -ingly for &ldquo;more and more&rdquo; before an adjective.",
      sentence:
        'Cycling is becoming <span class="gap-mark">______</span> popular in this city.'
    },
    {
      root: "ORIGIN",
      answers: ["originally"],
      tip: "Noun / adjective base + -ly &mdash; watch the single <em>l</em>.",
      sentence:
        'This museum was <span class="gap-mark">______</span> built as a palace.'
    },
    {
      root: "DAY",
      answers: ["daily"],
      tip: "Irregular: &ldquo;every day&rdquo; as one word is this adverb.",
      sentence:
        "Mike&rsquo;s still in hospital, but his condition is improving <span class=\"gap-mark\">______</span>."
    },
    {
      root: "WHOLE",
      answers: ["wholly"],
      tip: "Means &ldquo;completely&rdquo;; not the same spelling as <em>whole</em> + <em>-ly</em>.",
      sentence:
        "The Government&rsquo;s response to the crisis is <span class=\"gap-mark\">______</span> inadequate."
    },
    {
      root: "CARE",
      answers: ["carelessly"],
      tip: "Negative adverb: you do not drive with care.",
      sentence:
        'Tim was stopped by the police and accused of driving <span class="gap-mark">______</span>.'
    },
    {
      root: "HEALTH",
      answers: ["unhealthily"],
      tip: "&ldquo;However&rdquo; contrasts sport with a bad diet &mdash; prefix <em>un-</em> + adverb.",
      sentence:
        'Lynne does a lot of exercise. However, she eats far too <span class="gap-mark">______</span>.'
    }
  ];

  var ROUND = ROUND_ITEMS.length;
  var MAX_LIVES = 3;

  var index = 0;
  var lives = MAX_LIVES;

  var heartsEl = document.getElementById("hearts");
  var progressEl = document.getElementById("progress");
  var rootWordEl = document.getElementById("rootWord");
  var sentenceEl = document.getElementById("sentence");
  var answerEl = document.getElementById("answer");
  var feedbackEl = document.getElementById("feedback");
  var checkBtn = document.getElementById("checkBtn");
  var winOverlay = document.getElementById("winOverlay");
  var loseOverlay = document.getElementById("loseOverlay");
  var wrongRevealOverlay = document.getElementById("wrongRevealOverlay");
  var wrongRevealAnswer = document.getElementById("wrongRevealAnswer");
  var wrongRevealTip = document.getElementById("wrongRevealTip");
  var wrongRevealNext = document.getElementById("wrongRevealNext");
  var playAgain = document.getElementById("playAgain");
  var restartBtn = document.getElementById("restartBtn");
  var homeLink = document.getElementById("homeLink");

  function norm(s) {
    return String(s || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g, " ");
  }

  function heartSvg(className) {
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("class", className);
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("aria-hidden", "true");
    var path = document.createElementNS(ns, "path");
    path.setAttribute(
      "d",
      "M12 21s-6.5-4.35-9-8.5C.5 9.5 2 6 5.5 6c2 0 3.5 2 3.5 2S10.5 6 13 6c3.5 0 5 3.5 3.5 6.5C14 16.65 12 21 12 21z"
    );
    svg.appendChild(path);
    return svg;
  }

  function renderHearts() {
    heartsEl.innerHTML = "";
    for (var i = 0; i < MAX_LIVES; i++) {
      heartsEl.appendChild(heartSvg("heart " + (i < lives ? "on" : "off")));
    }
  }

  function matchesAnswer(raw, item) {
    var n = norm(raw);
    if (!n) return false;
    for (var i = 0; i < item.answers.length; i++) {
      if (n === norm(item.answers[i])) return true;
    }
    return false;
  }

  function keyDisplay(item) {
    return item.answers.join(" / ");
  }

  function showItem() {
    var item = ROUND_ITEMS[index];
    rootWordEl.textContent = "(" + item.root + ")";
    sentenceEl.innerHTML = item.sentence;
    answerEl.value = "";
    feedbackEl.textContent = "";
    feedbackEl.className = "feedback";
    progressEl.textContent = index + 1 + "/" + ROUND;
    answerEl.focus();
  }

  function startGameFresh() {
    index = 0;
    lives = MAX_LIVES;
    renderHearts();
    showItem();
    winOverlay.classList.remove("open");
    winOverlay.setAttribute("aria-hidden", "true");
    loseOverlay.classList.remove("open");
    loseOverlay.setAttribute("aria-hidden", "true");
    closeWrongReveal();
  }

  function openWrongReveal(item) {
    wrongRevealAnswer.textContent = keyDisplay(item);
    wrongRevealTip.textContent = item.tip || "";
    wrongRevealOverlay.style.display = "flex";
    wrongRevealOverlay.classList.add("open");
    wrongRevealOverlay.setAttribute("aria-hidden", "false");
    wrongRevealNext.focus();
  }

  function closeWrongReveal() {
    wrongRevealOverlay.classList.remove("open");
    wrongRevealOverlay.style.display = "none";
    wrongRevealOverlay.setAttribute("aria-hidden", "true");
  }

  function advanceAfterWrong() {
    index += 1;
    if (index >= ROUND) {
      winOverlay.classList.add("open");
      winOverlay.setAttribute("aria-hidden", "false");
      return;
    }
    showItem();
  }

  function onCheck() {
    var raw = answerEl.value;
    if (!norm(raw)) {
      feedbackEl.textContent = "Type the adverb first.";
      feedbackEl.className = "feedback bad";
      return;
    }

    var item = ROUND_ITEMS[index];
    var ok = matchesAnswer(raw, item);

    if (ok) {
      feedbackEl.textContent = "Correct!";
      feedbackEl.className = "feedback ok";
      index += 1;
      if (index >= ROUND) {
        winOverlay.classList.add("open");
        winOverlay.setAttribute("aria-hidden", "false");
        return;
      }
      setTimeout(function () {
        showItem();
      }, 420);
      return;
    }

    feedbackEl.textContent = "";
    answerEl.classList.add("shake");
    setTimeout(function () {
      answerEl.classList.remove("shake");
    }, 500);

    lives -= 1;
    renderHearts();
    openWrongReveal(item);
  }

  wrongRevealNext.addEventListener("click", function () {
    closeWrongReveal();
    if (lives <= 0) {
      loseOverlay.classList.add("open");
      loseOverlay.setAttribute("aria-hidden", "false");
      return;
    }
    advanceAfterWrong();
  });

  checkBtn.addEventListener("click", onCheck);
  answerEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      onCheck();
    }
  });

  restartBtn.addEventListener("click", function () {
    loseOverlay.classList.remove("open");
    loseOverlay.setAttribute("aria-hidden", "true");
    startGameFresh();
  });

  playAgain.addEventListener("click", function () {
    winOverlay.classList.remove("open");
    winOverlay.setAttribute("aria-hidden", "true");
    startGameFresh();
  });

  var q = new URLSearchParams(window.location.search);
  if (q.get("back")) {
    homeLink.href = q.get("back");
  }

  startGameFresh();
})();
  </script>
</body>
</html>
