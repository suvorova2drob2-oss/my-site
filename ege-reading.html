<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЕГЭ - Reading</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #0a0f1a 0%, #111827 45%, #0c1222 100%);
      color: #f1f5f9;
      padding: clamp(16px, 4vw, 32px);
    }
    .shell { max-width: 760px; margin: 0 auto; }
    .back {
      display: inline-block;
      margin-bottom: 12px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 700;
    }
    h1 { font-size: 1.45rem; margin: 0 0 8px; }
    p.lead { color: #94a3b8; font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
    .stack {
      display: grid;
      gap: 12px;
    }
    .folder {
      display: block;
      padding: 18px 20px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(30, 41, 59, 0.55);
      color: inherit;
      text-decoration: none;
    }
    .line { color: #94a3b8; font-size: 13px; margin-top: 8px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="shell">
    <a class="back" href="ege.html">&larr; Назад</a>
    <h1>Reading</h1>
    <p class="lead">Reading для ЕГЭ. Здесь только 3 папки нового раздела.</p>
    <div class="stack">
      <a class="folder" href="#">
        <strong>Matching Headlines</strong>
        <div class="line">Папка для заданий ЕГЭ на подбор заголовков к абзацам.</div>
      </a>

      <a class="folder" href="#">
        <strong>Gapped Text</strong>
        <div class="line">Папка для заданий ЕГЭ с пропусками и восстановлением частей текста.</div>
      </a>

      <a class="folder" href="#">
        <strong>Multiple Choice</strong>
        <div class="line">Папка для заданий ЕГЭ по чтению с выбором ответа.</div>
      </a>
    </div>
  </div>
</body>
</html>
