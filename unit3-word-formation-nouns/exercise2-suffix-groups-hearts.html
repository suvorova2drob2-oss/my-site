<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 3 &mdash; Nouns · Suffix groups (hearts)</title>
  <style>
    :root {
      --bg: #181e28;
      --bg-card: #1e2530;
      --bg-inner: #252d3a;
      --line: #3a4556;
      --text: #f7f9fc;
      --text-dim: #9eb0c8;
      --pink: #f25176;
      --pink-glow: rgba(242, 81, 118, 0.12);
      --cyan: #4fbbf2;
      --heart-off: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 600px at 50% -20%, #243044 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .shell {
      width: min(440px, 100%);
      background: linear-gradient(165deg, #252e3d 0%, var(--bg-card) 45%, #1a2029 100%);
      border: 1px solid #3d4d63;
      border-radius: 22px;
      padding: 22px 22px 26px;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.22), 0 24px 56px rgba(0, 0, 0, 0.45);
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 2px 18px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .home {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .home:hover { color: var(--cyan); border-color: #55667d; }
    .home svg { width: 22px; height: 22px; }
    .hearts { display: flex; gap: 10px; flex: 1; justify-content: center; align-items: center; }
    .heart { width: 28px; height: 26px; transition: opacity 0.2s, transform 0.2s; }
    .heart.on {
      filter: drop-shadow(0 2px 1px rgba(180, 40, 80, 0.85)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
    }
    .heart.off { opacity: 0.38; transform: scale(0.88); }
    .heart.off path { fill: var(--heart-off); }
    .heart.on path { fill: url(#heartGrad); }
    .counter { font-weight: 700; font-size: 1.02rem; color: var(--text-dim); min-width: 4.5ch; text-align: right; }
    .stage { text-align: center; }
    .instruction {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .sub {
      font-size: 0.94rem;
      color: var(--text-dim);
      line-height: 1.45;
      margin-bottom: 16px;
    }
    .root-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
    .root {
      display: inline-block;
      font-size: clamp(1.45rem, 6vw, 1.85rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--pink);
      padding: 14px 20px;
      border-radius: 14px;
      border: 2px solid var(--pink);
      background: var(--pink-glow);
    }
    .input-wrap { margin-bottom: 14px; }
    .input-wrap input {
      width: 100%;
      padding: 15px 16px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text);
      outline: none;
      text-align: center;
    }
    .input-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(79, 187, 242, 0.22); }
    .input-wrap input.shake { animation: shake 0.45s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .feedback { min-height: 1.45em; font-size: 0.94rem; margin-bottom: 12px; text-align: center; }
    .feedback.bad { color: #ff9aab; }
    .feedback.ok { color: #5ee4a8; }
    .check {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8, 0 8px 24px rgba(79, 187, 242, 0.25);
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 99998;
    }
    .overlay.open { display: flex; }
    .overlay.wrong-reveal {
      flex-direction: column;
      background: rgba(8, 11, 18, 0.96);
      z-index: 99999;
    }
    #winOverlay.open,
    #loseOverlay.open {
      background: rgba(8, 11, 18, 0.9);
    }
    .wrong-reveal-box { width: min(520px, 100%); text-align: center; }
    .wrong-reveal-label {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .wrong-reveal-answer {
      font-size: clamp(2rem, 9vw, 3rem);
      font-weight: 800;
      color: #4ade80;
      margin-bottom: 22px;
      padding: 20px 18px;
      border-radius: 18px;
      border: 2px solid rgba(74, 222, 128, 0.55);
      background: rgba(34, 197, 94, 0.14);
      word-break: break-word;
    }
    .wrong-reveal-tip { font-size: 0.94rem; color: #cbd5e1; margin-bottom: 24px; font-style: italic; line-height: 1.45; }
    .wrong-reveal-next {
      max-width: 300px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8;
    }
    .modal {
      background: var(--bg-inner);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      max-width: 380px;
      text-align: center;
    }
    .modal button {
      width: 100%;
      margin-top: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: var(--cyan);
      color: #0a1628;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true">
    <defs>
      <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ff7eb3" />
        <stop offset="100%" style="stop-color:#e8487a" />
      </linearGradient>
    </defs>
  </svg>
  <div class="shell">
    <header class="bar">
      <a class="home" href="index.html" aria-label="Back to nouns folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z" /></svg>
      </a>
      <div class="hearts" id="hearts"></div>
      <div class="counter" id="progress">1/28</div>
    </header>
    <div class="stage">
      <p class="instruction">Exercise 2 &middot; nouns from suffixes</p>
      <p class="sub">You see a base word. Type the <strong>noun</strong> (same order as the table: rows 0&ndash;6).</p>
      <div class="root-wrap">
        <span class="root" id="rootWord">object</span>
      </div>
    </div>
    <div class="input-wrap">
      <input type="text" id="answer" autocomplete="off" spellcheck="true" placeholder="Type the noun" />
    </div>
    <p class="feedback" id="feedback"></p>
    <button type="button" class="check" id="checkBtn">Check</button>
  </div>

  <div class="overlay wrong-reveal" id="wrongRevealOverlay" role="dialog" aria-modal="true" aria-hidden="true" style="display: none;">
    <div class="wrong-reveal-box">
      <p class="wrong-reveal-label">Correct answer</p>
      <p class="wrong-reveal-answer" id="wrongRevealAnswer"></p>
      <p class="wrong-reveal-tip" id="wrongRevealTip"></p>
      <button type="button" class="wrong-reveal-next" id="wrongRevealNext">Continue</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h2>Well done</h2>
      <p>All 28 words in this run.</p>
      <button type="button" id="playAgain">Play again</button>
    </div>
  </div>

  <div class="overlay" id="loseOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h2>No hearts left</h2>
      <p>The list restarts from the first word.</p>
      <button type="button" id="restartBtn">OK</button>
    </div>
  </div>

  <script>
    /* Table rows 0&ndash;6 from the Skills Booster suffix exercise (order left to right, top to bottom). */
    var ROUND_ITEMS = [
      { root: "object", answers: ["objection"], tip: "Same group as react / predict &mdash; &lsquo;object&rsquo; + noun ending." },
      { root: "react", answers: ["reaction"], tip: "" },
      { root: "predict", answers: ["prediction"], tip: "" },
      { root: "convert", answers: ["conversion"], tip: "" },
      { root: "enjoy", answers: ["enjoyment"], tip: "" },
      { root: "treat", answers: ["treatment"], tip: "" },
      { root: "govern", answers: ["government"], tip: "" },
      { root: "argue", answers: ["argument"], tip: "" },
      { root: "original", answers: ["originality"], tip: "" },
      { root: "popular", answers: ["popularity"], tip: "" },
      { root: "major", answers: ["majority"], tip: "" },
      { root: "able", answers: ["ability"], tip: "" },
      { root: "appear", answers: ["appearance"], tip: "" },
      { root: "assist", answers: ["assistance"], tip: "" },
      { root: "annoy", answers: ["annoyance"], tip: "" },
      { root: "tolerate", answers: ["tolerance"], tip: "" },
      { root: "sad", answers: ["sadness"], tip: "" },
      { root: "weak", answers: ["weakness"], tip: "" },
      { root: "careless", answers: ["carelessness"], tip: "" },
      { root: "lonely", answers: ["loneliness"], tip: "" },
      { root: "inform", answers: ["information"], tip: "" },
      { root: "resign", answers: ["resignation"], tip: "" },
      { root: "present", answers: ["presentation"], tip: "" },
      { root: "explain", answers: ["explanation"], tip: "" },
      { root: "differ", answers: ["difference"], tip: "" },
      { root: "exist", answers: ["existence"], tip: "" },
      { root: "depend", answers: ["dependence"], tip: "" },
      { root: "obey", answers: ["obedience"], tip: "" }
    ];

    var ROUND = ROUND_ITEMS.length;
    var MAX_LIVES = 3;
    var index = 0;
    var lives = MAX_LIVES;

    var heartsEl = document.getElementById("hearts");
    var progressEl = document.getElementById("progress");
    var rootWordEl = document.getElementById("rootWord");
    var answerEl = document.getElementById("answer");
    var feedbackEl = document.getElementById("feedback");
    var checkBtn = document.getElementById("checkBtn");
    var winOverlay = document.getElementById("winOverlay");
    var loseOverlay = document.getElementById("loseOverlay");
    var wrongRevealOverlay = document.getElementById("wrongRevealOverlay");
    var wrongRevealAnswer = document.getElementById("wrongRevealAnswer");
    var wrongRevealTip = document.getElementById("wrongRevealTip");
    var wrongRevealNext = document.getElementById("wrongRevealNext");
    var playAgain = document.getElementById("playAgain");
    var restartBtn = document.getElementById("restartBtn");

    function norm(s) {
      return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function heartSvg(on) {
      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("class", "heart " + (on ? "on" : "off"));
      svg.setAttribute("viewBox", "0 0 24 24");
      var path = document.createElementNS(ns, "path");
      path.setAttribute("d", "M12 21s-6.5-4.35-9-8.5C.5 9.5 2 6 5.5 6c2 0 3.5 2 3.5 2S10.5 6 13 6c3.5 0 5 3.5 3.5 6.5C14 16.65 12 21 12 21z");
      svg.appendChild(path);
      return svg;
    }

    function renderHearts() {
      heartsEl.innerHTML = "";
      for (var i = 0; i < MAX_LIVES; i++) {
        heartsEl.appendChild(heartSvg(i < lives));
      }
    }

    function matches(raw, item) {
      var n = norm(raw);
      if (!n) return false;
      for (var i = 0; i < item.answers.length; i++) {
        if (n === norm(item.answers[i])) return true;
      }
      return false;
    }

    function keyLabel(item) {
      return item.answers.join(" / ");
    }

    function showItem() {
      var item = ROUND_ITEMS[index];
      rootWordEl.textContent = item.root;
      answerEl.value = "";
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      progressEl.textContent = index + 1 + "/" + ROUND;
      answerEl.focus();
    }

    function startGameFresh() {
      index = 0;
      lives = MAX_LIVES;
      renderHearts();
      showItem();
      winOverlay.classList.remove("open");
      winOverlay.setAttribute("aria-hidden", "true");
      loseOverlay.classList.remove("open");
      loseOverlay.setAttribute("aria-hidden", "true");
      closeWrongReveal();
    }

    function openWrongReveal(item) {
      wrongRevealAnswer.textContent = keyLabel(item);
      wrongRevealTip.textContent = item.tip || "";
      wrongRevealOverlay.style.display = "flex";
      wrongRevealOverlay.classList.add("open");
      wrongRevealOverlay.setAttribute("aria-hidden", "false");
      wrongRevealNext.focus();
    }

    function closeWrongReveal() {
      wrongRevealOverlay.classList.remove("open");
      wrongRevealOverlay.style.display = "none";
      wrongRevealOverlay.setAttribute("aria-hidden", "true");
    }

    function advanceAfterWrong() {
      index += 1;
      if (index >= ROUND) {
        winOverlay.classList.add("open");
        winOverlay.setAttribute("aria-hidden", "false");
        return;
      }
      showItem();
    }

    function onCheck() {
      var raw = answerEl.value;
      if (!norm(raw)) {
        feedbackEl.textContent = "Type the noun first.";
        feedbackEl.className = "feedback bad";
        return;
      }
      var item = ROUND_ITEMS[index];
      if (matches(raw, item)) {
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "feedback ok";
        index += 1;
        if (index >= ROUND) {
          winOverlay.classList.add("open");
          winOverlay.setAttribute("aria-hidden", "false");
          return;
        }
        setTimeout(showItem, 400);
        return;
      }
      feedbackEl.textContent = "";
      answerEl.classList.add("shake");
      setTimeout(function () { answerEl.classList.remove("shake"); }, 500);
      lives -= 1;
      renderHearts();
      openWrongReveal(item);
    }

    wrongRevealNext.addEventListener("click", function () {
      closeWrongReveal();
      if (lives <= 0) {
        loseOverlay.classList.add("open");
        loseOverlay.setAttribute("aria-hidden", "false");
        return;
      }
      advanceAfterWrong();
    });

    checkBtn.addEventListener("click", onCheck);
    answerEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        onCheck();
      }
    });

    restartBtn.addEventListener("click", function () {
      loseOverlay.classList.remove("open");
      loseOverlay.setAttribute("aria-hidden", "true");
      startGameFresh();
    });

    playAgain.addEventListener("click", function () {
      winOverlay.classList.remove("open");
      winOverlay.setAttribute("aria-hidden", "true");
      startGameFresh();
    });

    startGameFresh();
  </script>
</body>
</html>
