<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 12 — Word formation exercise</title>
  <style>
    :root {
      --bg: #181e28;
      --bg-card: #1e2530;
      --bg-inner: #252d3a;
      --line: #3a4556;
      --text: #f7f9fc;
      --text-dim: #9eb0c8;
      --pink: #f25176;
      --pink-glow: rgba(242, 81, 118, 0.12);
      --cyan: #4fbbf2;
      --heart-off: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 600px at 50% -20%, #243044 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .shell {
      width: min(560px, 100%);
      background: linear-gradient(165deg, #252e3d 0%, var(--bg-card) 45%, #1a2029 100%);
      border: 1px solid #3d4d63;
      border-radius: 22px;
      padding: 22px 22px 26px;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.22),
        0 24px 56px rgba(0, 0, 0, 0.45);
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 2px 18px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .home {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .home:hover { color: var(--cyan); border-color: #55667d; }
    .home:active { transform: scale(0.97); }
    .home svg { width: 22px; height: 22px; }
    .hearts {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    .heart {
      width: 28px;
      height: 26px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .heart.on {
      filter: drop-shadow(0 2px 1px rgba(180, 40, 80, 0.85)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
    }
    .heart.off {
      opacity: 0.38;
      transform: scale(0.88);
    }
    .heart.off path { fill: var(--heart-off); }
    .heart.on path { fill: url(#heartGrad); }
    .counter {
      font-weight: 700;
      font-size: 1.02rem;
      color: var(--text-dim);
      min-width: 3.5ch;
      text-align: right;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .example-strip {
      font-size: 0.92rem;
      line-height: 1.5;
      color: var(--text-dim);
      background: rgba(37, 45, 58, 0.65);
      border: 1px dashed #4a5f82;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .example-strip em {
      color: #c5d2eb;
      font-style: italic;
    }
    .line-num {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      text-align: center;
    }
    .sentence {
      font-size: 1.02rem;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 18px;
      text-align: center;
    }
    .roots-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .root {
      display: inline-block;
      text-align: center;
      font-size: clamp(1.25rem, 4vw, 1.65rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--pink);
      padding: 12px 18px;
      border-radius: 14px;
      border: 2px solid var(--pink);
      background: var(--pink-glow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .input-wrap { margin-bottom: 12px; }
    .input-row-double {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .input-row-double input {
      flex: 1;
      min-width: 140px;
      max-width: 220px;
    }
    .input-wrap input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.02rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text);
      outline: none;
      text-align: center;
    }
    .input-wrap input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(79, 187, 242, 0.22);
    }
    .input-wrap input.shake {
      animation: shake 0.45s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .feedback {
      min-height: 1.45em;
      font-size: 0.94rem;
      margin-bottom: 10px;
      text-align: center;
    }
    .feedback.bad { color: #ff9aab; }
    .feedback.ok { color: #5ee4a8; }
    .check {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8, 0 8px 24px rgba(79, 187, 242, 0.25);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .check:hover { filter: brightness(1.05); }
    .check:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2a8ab8, 0 4px 16px rgba(79, 187, 242, 0.2);
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 22, 0.88);
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }
    .overlay.open { display: flex; }
    .overlay.wrong-reveal {
      z-index: 99999;
      background: rgba(8, 11, 18, 0.97);
      flex-direction: column;
      justify-content: center;
      padding: 32px 20px;
    }
    .overlay.wrong-reveal.open {
      display: flex !important;
    }
    .wrong-reveal-box {
      width: min(560px, 100%);
      text-align: center;
    }
    .wrong-reveal-label {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 16px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .wrong-reveal-answer {
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      font-weight: 800;
      color: #4ade80;
      line-height: 1.25;
      margin-bottom: 28px;
      padding: 22px 20px;
      border-radius: 18px;
      border: 2px solid rgba(74, 222, 128, 0.55);
      background: rgba(34, 197, 94, 0.14);
      box-shadow:
        0 0 0 1px rgba(74, 222, 128, 0.12),
        0 8px 40px rgba(34, 197, 94, 0.25);
      text-shadow: 0 2px 24px rgba(74, 222, 128, 0.55);
      word-break: break-word;
      white-space: pre-line;
    }
    .wrong-reveal-motivate {
      font-size: clamp(1.25rem, 4.5vw, 1.65rem);
      color: #e8ecf4;
      line-height: 1.45;
      margin-bottom: 36px;
      font-weight: 600;
    }
    .wrong-reveal-next {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8;
    }
    .wrong-reveal-next:hover { filter: brightness(1.06); }
    .modal {
      background: var(--bg-inner);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      text-align: center;
    }
    .modal h2 { margin-bottom: 10px; font-size: 1.25rem; }
    .modal p { color: var(--text-dim); margin-bottom: 18px; line-height: 1.45; }
    .modal button {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: var(--cyan);
      color: #0a1628;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ff7eb3" />
        <stop offset="100%" style="stop-color:#e8487a" />
      </linearGradient>
    </defs>
  </svg>
  <div class="shell">
    <header class="bar">
      <a class="home" href="../index.html" aria-label="Back to word formation folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z" />
        </svg>
      </a>
      <div class="hearts" id="hearts" aria-live="polite"></div>
      <div class="counter" id="progress">1/7</div>
    </header>

    <p class="example-strip">
      <strong>Example.</strong> <span class="num">1.</span> <strong>Laughter</strong> (<em>laugh</em>) is the best medicine.
    </p>

    <div id="game">
      <p class="line-num" id="lineNum">2.</p>
      <p class="sentence" id="sentence"></p>
      <div class="roots-row" id="rootsRow"></div>
      <div class="input-wrap" id="wrapSingle">
        <input type="text" id="answerSingle" autocomplete="off" spellcheck="false" placeholder="Type the noun" />
      </div>
      <div class="input-wrap" id="wrapDouble" style="display: none;">
        <div class="input-row-double">
          <input type="text" id="answerD1" autocomplete="off" spellcheck="false" placeholder="First noun" />
          <input type="text" id="answerD2" autocomplete="off" spellcheck="false" placeholder="Second noun" />
        </div>
      </div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <button type="button" class="check" id="checkBtn">Check</button>
    </div>
  </div>

  <div class="overlay wrong-reveal" id="wrongRevealOverlay" role="dialog" aria-modal="true" aria-labelledby="wrongRevealLabel" aria-hidden="true" style="display: none;">
    <div class="wrong-reveal-box">
      <p class="wrong-reveal-label" id="wrongRevealLabel">Правильный ответ</p>
      <p class="wrong-reveal-answer" id="wrongRevealAnswer">—</p>
      <p class="wrong-reveal-motivate">Давай, ты справишься!</p>
      <button type="button" class="wrong-reveal-next" id="wrongRevealNext">Дальше</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="modal">
      <h2 id="winTitle">Well done!</h2>
      <p id="winMsg">You finished the exercise.</p>
      <button type="button" id="playAgain">Play again</button>
    </div>
  </div>

  <div class="overlay" id="loseOverlay" role="dialog" aria-modal="true" aria-labelledby="loseTitle">
    <div class="modal">
      <h2 id="loseTitle">Back to the start</h2>
      <p>You used all three hearts. The exercise restarts from the first task.</p>
      <button type="button" id="restartBtn">OK</button>
    </div>
  </div>

  <script>
    /**
     * Word formation — sentences from your worksheet (items 2–8).
     * accept: each slot lists acceptable spellings (first = shown on reveal).
     */
    const STEPS = [
      {
        num: 2,
        sentence: "The secret of ______ (*succeed*) is hard work.",
        roots: ["succeed"],
        accept: [["success"]]
      },
      {
        num: 3,
        sentence: "Too much ______ (*choose*) is a bad thing.",
        roots: ["choose"],
        accept: [["choice"]]
      },
      {
        num: 4,
        sentence: "A little ______ (*know*) is a dangerous thing.",
        roots: ["know"],
        accept: [["knowledge"]]
      },
      {
        num: 5,
        sentence: "The worst thing about becoming famous is the ______ (*lose*) of ______ (*private*).",
        roots: ["lose", "private"],
        accept: [["loss"], ["privacy"]]
      },
      {
        num: 6,
        sentence: "Protecting freedom of ______ (*speak*) is more important than protecting people from being offended.",
        roots: ["speak"],
        accept: [["speech"]]
      },
      {
        num: 7,
        sentence: "There is no ______ (*prove*) that alien life exists.",
        roots: ["prove"],
        accept: [["proof"]]
      },
      {
        num: 8,
        sentence: "Your ______ (*believe*) don't make you a better person, your ______ (*behave*) does.",
        roots: ["believe", "behave"],
        accept: [["beliefs"], ["behavior", "behaviour"]]
      }
    ];

    const ROUND = STEPS.length;
    const MAX_LIVES = 3;

    let index = 0;
    let lives = MAX_LIVES;

    const heartsEl = document.getElementById("hearts");
    const progressEl = document.getElementById("progress");
    const lineNumEl = document.getElementById("lineNum");
    const sentenceEl = document.getElementById("sentence");
    const rootsRow = document.getElementById("rootsRow");
    const wrapSingle = document.getElementById("wrapSingle");
    const wrapDouble = document.getElementById("wrapDouble");
    const answerSingle = document.getElementById("answerSingle");
    const answerD1 = document.getElementById("answerD1");
    const answerD2 = document.getElementById("answerD2");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const winOverlay = document.getElementById("winOverlay");
    const loseOverlay = document.getElementById("loseOverlay");
    const wrongRevealOverlay = document.getElementById("wrongRevealOverlay");
    const wrongRevealAnswer = document.getElementById("wrongRevealAnswer");
    const wrongRevealNext = document.getElementById("wrongRevealNext");
    const playAgain = document.getElementById("playAgain");
    const restartBtn = document.getElementById("restartBtn");
    const winMsg = document.getElementById("winMsg");

    [wrongRevealOverlay, winOverlay, loseOverlay].forEach(function (el) {
      document.body.appendChild(el);
    });

    function norm(s) {
      return s.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function heartSvg(className) {
      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("class", className);
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      const path = document.createElementNS(ns, "path");
      path.setAttribute(
        "d",
        "M12 21s-6.5-4.35-9-8.5C.5 9.5 2 6 5.5 6c2 0 3.5 2 3.5 2S10.5 6 13 6c3.5 0 5 3.5 3.5 6.5C14 16.65 12 21 12 21z"
      );
      svg.appendChild(path);
      return svg;
    }

    function renderHearts() {
      heartsEl.innerHTML = "";
      for (let i = 0; i < MAX_LIVES; i++) {
        heartsEl.appendChild(heartSvg("heart " + (i < lives ? "on" : "off")));
      }
    }

    function formatReveal(step) {
      return step.accept
        .map(function (opts) {
          return opts.join(" / ");
        })
        .join(" · ");
    }

    function isCorrect(step, vals) {
      if (vals.length !== step.accept.length) return false;
      for (let i = 0; i < step.accept.length; i++) {
        const n = norm(vals[i]);
        const ok = step.accept[i].some(function (opt) {
          return norm(opt) === n;
        });
        if (!ok) return false;
      }
      return true;
    }

    function showItem() {
      const step = STEPS[index];
      lineNumEl.textContent = step.num + ".";
      sentenceEl.textContent = step.sentence;
      rootsRow.innerHTML = "";
      step.roots.forEach(function (r) {
        const span = document.createElement("span");
        span.className = "root";
        span.textContent = r;
        rootsRow.appendChild(span);
      });

      const dual = step.accept.length > 1;
      wrapSingle.style.display = dual ? "none" : "block";
      wrapDouble.style.display = dual ? "block" : "none";
      answerSingle.value = "";
      answerD1.value = "";
      answerD2.value = "";
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      progressEl.textContent = index + 1 + "/" + ROUND;
      if (dual) {
        answerD1.focus();
      } else {
        answerSingle.focus();
      }
    }

    function closeWrongReveal() {
      wrongRevealOverlay.classList.remove("open");
      wrongRevealOverlay.style.display = "none";
      wrongRevealOverlay.setAttribute("aria-hidden", "true");
    }

    function openWrongReveal(text) {
      wrongRevealAnswer.textContent = String(text);
      wrongRevealOverlay.removeAttribute("hidden");
      wrongRevealOverlay.classList.add("open");
      wrongRevealOverlay.style.display = "flex";
      wrongRevealOverlay.setAttribute("aria-hidden", "false");
      wrongRevealNext.focus();
    }

    function startGameFresh() {
      index = 0;
      lives = MAX_LIVES;
      renderHearts();
      showItem();
      winOverlay.classList.remove("open");
      loseOverlay.classList.remove("open");
      closeWrongReveal();
      winMsg.textContent = "You finished all " + ROUND + " sentences in this exercise.";
    }

    function restartSameRound() {
      index = 0;
      lives = MAX_LIVES;
      renderHearts();
      showItem();
      loseOverlay.classList.remove("open");
      closeWrongReveal();
    }

    function advanceAfterWrong() {
      index += 1;
      if (index >= ROUND) {
        winOverlay.classList.add("open");
        return;
      }
      showItem();
    }

    function onCheck() {
      const step = STEPS[index];
      let vals;
      if (step.accept.length === 1) {
        const raw = answerSingle.value;
        if (!norm(raw)) {
          feedbackEl.textContent = "Type an answer first.";
          feedbackEl.className = "feedback bad";
          return;
        }
        vals = [raw];
      } else {
        if (!norm(answerD1.value) || !norm(answerD2.value)) {
          feedbackEl.textContent = "Fill in both gaps.";
          feedbackEl.className = "feedback bad";
          return;
        }
        vals = [answerD1.value, answerD2.value];
      }

      if (isCorrect(step, vals)) {
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "feedback ok";
        index += 1;
        if (index >= ROUND) {
          winOverlay.classList.add("open");
          return;
        }
        setTimeout(function () {
          showItem();
        }, 450);
        return;
      }

      feedbackEl.textContent = "";
      const shakeEl = step.accept.length === 1 ? answerSingle : wrapDouble;
      shakeEl.querySelectorAll("input").forEach(function (inp) {
        inp.classList.add("shake");
        setTimeout(function () {
          inp.classList.remove("shake");
        }, 500);
      });

      lives -= 1;
      renderHearts();
      openWrongReveal(formatReveal(step));
    }

    wrongRevealNext.addEventListener("click", function () {
      closeWrongReveal();
      if (lives <= 0) {
        loseOverlay.classList.add("open");
        return;
      }
      advanceAfterWrong();
    });

    checkBtn.addEventListener("click", onCheck);
    answerSingle.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        onCheck();
      }
    });
    answerD1.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        answerD2.focus();
      }
    });
    answerD2.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        onCheck();
      }
    });

    restartBtn.addEventListener("click", function () {
      restartSameRound();
    });

    playAgain.addEventListener("click", function () {
      winOverlay.classList.remove("open");
      startGameFresh();
    });

    startGameFresh();
  </script>
</body>
</html>
