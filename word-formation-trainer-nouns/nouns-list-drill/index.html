<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 12 — Nouns list drill</title>
  <style>
    :root {
      --bg: #181e28;
      --bg-card: #1e2530;
      --bg-inner: #252d3a;
      --line: #3a4556;
      --text: #f7f9fc;
      --text-dim: #9eb0c8;
      --pink: #f25176;
      --pink-glow: rgba(242, 81, 118, 0.12);
      --cyan: #4fbbf2;
      --heart-off: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 600px at 50% -20%, #243044 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .shell {
      width: min(400px, 100%);
      background: linear-gradient(165deg, #252e3d 0%, var(--bg-card) 45%, #1a2029 100%);
      border: 1px solid #3d4d63;
      border-radius: 22px;
      padding: 22px 22px 26px;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.22),
        0 24px 56px rgba(0, 0, 0, 0.45);
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 2px 18px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .home {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .home:hover { color: var(--cyan); border-color: #55667d; }
    .home:active { transform: scale(0.97); }
    .home svg { width: 22px; height: 22px; }
    .hearts {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    .heart {
      width: 28px;
      height: 26px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .heart.on {
      filter: drop-shadow(0 2px 1px rgba(180, 40, 80, 0.85)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
    }
    .heart.off {
      opacity: 0.38;
      transform: scale(0.88);
    }
    .heart.off path { fill: var(--heart-off); }
    .heart.on path {
      fill: url(#heartGrad);
    }
    .counter {
      font-weight: 700;
      font-size: 1.02rem;
      color: var(--text-dim);
      min-width: 3.5ch;
      text-align: right;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .stage {
      text-align: center;
    }
    .root-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .root {
      display: inline-block;
      min-width: min(100%, 280px);
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--pink);
      padding: 16px 20px;
      border-radius: 14px;
      border: 2px solid var(--pink);
      background: var(--pink-glow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .root.as-listed {
      letter-spacing: 0.02em;
      font-weight: 700;
      text-transform: none;
    }
    .sentence {
      font-size: 1.02rem;
      line-height: 1.6;
      color: var(--text-dim);
      margin-bottom: 22px;
      min-height: 3.3em;
      max-width: 32em;
      margin-left: auto;
      margin-right: auto;
    }
    .input-wrap {
      margin-bottom: 14px;
      max-width: 100%;
    }
    .input-wrap input {
      width: 100%;
      padding: 15px 16px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-inner);
      color: var(--text);
      outline: none;
      text-align: center;
    }
    .input-wrap input::placeholder { color: #5c6b82; }
    .input-wrap input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(79, 187, 242, 0.22);
    }
    .input-wrap input.shake {
      animation: shake 0.45s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .feedback {
      min-height: 1.45em;
      font-size: 0.94rem;
      margin-bottom: 12px;
      text-align: center;
    }
    .feedback.bad { color: #ff9aab; }
    .feedback.ok { color: #5ee4a8; }
    .check {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8, 0 8px 24px rgba(79, 187, 242, 0.25);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .check:hover { filter: brightness(1.05); }
    .check:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2a8ab8, 0 4px 16px rgba(79, 187, 242, 0.2);
    }
    .check:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 22, 0.88);
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }
    .overlay.open { display: flex; }
    /* Wrong-answer screen: always on top; JS also sets inline display:flex */
    .overlay.wrong-reveal {
      z-index: 99999;
      background: rgba(8, 11, 18, 0.97);
      flex-direction: column;
      justify-content: center;
      padding: 32px 20px;
    }
    .overlay.wrong-reveal.open {
      display: flex !important;
    }
    .wrong-reveal-box {
      width: min(520px, 100%);
      text-align: center;
    }
    .wrong-reveal-label {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 16px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .wrong-reveal-answer {
      font-size: clamp(2.2rem, 10vw, 3.5rem);
      font-weight: 800;
      color: #4ade80;
      line-height: 1.15;
      margin-bottom: 28px;
      padding: 22px 20px;
      border-radius: 18px;
      border: 2px solid rgba(74, 222, 128, 0.55);
      background: rgba(34, 197, 94, 0.14);
      box-shadow:
        0 0 0 1px rgba(74, 222, 128, 0.12),
        0 8px 40px rgba(34, 197, 94, 0.25);
      text-shadow: 0 2px 24px rgba(74, 222, 128, 0.55);
      word-break: break-word;
      white-space: pre-line;
    }
    .wrong-reveal-motivate {
      font-size: clamp(1.25rem, 4.5vw, 1.65rem);
      color: #e8ecf4;
      line-height: 1.45;
      margin-bottom: 36px;
      font-weight: 600;
    }
    .wrong-reveal-next {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #62c9f7 0%, var(--cyan) 45%, #3aa8db 100%);
      cursor: pointer;
      box-shadow: 0 4px 0 #2a8ab8;
    }
    .wrong-reveal-next:hover { filter: brightness(1.06); }
    .modal {
      background: var(--bg-inner);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      text-align: center;
    }
    .modal h2 { margin-bottom: 10px; font-size: 1.25rem; }
    .modal p { color: var(--text-dim); margin-bottom: 18px; line-height: 1.45; }
    .modal button {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: var(--cyan);
      color: #0a1628;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ff7eb3" />
        <stop offset="100%" style="stop-color:#e8487a" />
      </linearGradient>
    </defs>
  </svg>
  <div class="shell">
    <header class="bar">
      <a class="home" href="../index.html" aria-label="Back to word formation folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z" />
        </svg>
      </a>
      <div class="hearts" id="hearts" aria-live="polite"></div>
      <div class="counter" id="progress">1/8</div>
    </header>

    <div id="game">
      <div class="stage">
        <div class="root-wrap">
          <span class="root as-listed" id="rootWord">—</span>
        </div>
        <p class="sentence" id="sentence"></p>
      </div>
      <div class="input-wrap">
        <input type="text" id="answer" autocomplete="off" spellcheck="false" placeholder="Type the noun" />
      </div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <button type="button" class="check" id="checkBtn">Check</button>
    </div>
  </div>

  <div class="overlay wrong-reveal" id="wrongRevealOverlay" role="dialog" aria-modal="true" aria-labelledby="wrongRevealLabel" aria-hidden="true" style="display: none;">
    <div class="wrong-reveal-box">
      <p class="wrong-reveal-label" id="wrongRevealLabel">Правильный ответ</p>
      <p class="wrong-reveal-answer" id="wrongRevealAnswer">—</p>
      <p class="wrong-reveal-motivate">Давай, ты справишься!</p>
      <button type="button" class="wrong-reveal-next" id="wrongRevealNext">Дальше</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="modal">
      <h2 id="winTitle">Well done!</h2>
      <p id="winMsg">You completed this round without losing your lives.</p>
      <button type="button" id="playAgain">Play again</button>
    </div>
  </div>

  <div class="overlay" id="loseOverlay" role="dialog" aria-modal="true" aria-labelledby="loseTitle">
    <div class="modal">
      <h2 id="loseTitle">Back to the start</h2>
      <p>You used all three hearts. The round restarts from the first word.</p>
      <button type="button" id="restartBtn">OK</button>
    </div>
  </div>

  <script>
    /**
     * Word bank: your sheet only — row 0 (examples) + rows 1–8.
     */
    const BANK = [
      { root: "honest", noun: "honesty", sentence: "We all valued her ______ and direct answers." },
      { root: "difficult", noun: "difficulty", sentence: "The main ______ was finishing on time." },
      { root: "safe", noun: "safety", sentence: "The museum improved ______ for visitors." },
      { root: "poor", noun: "poverty", sentence: "The programme aims to reduce ______ in the region." },
      { root: "say", noun: "saying", sentence: "There's an old ______: look before you leap." },
      { root: "meet", noun: "meeting", sentence: "The ______ between the leaders lasted two hours." },
      { root: "build", noun: "building", sentence: "The ______ of the bridge took three years." },
      { root: "advertise", noun: "advertisement", sentence: "We saw an ______ for the concert on TV." },
      { root: "fail", noun: "failure", sentence: "The project ended in complete ______." },
      { root: "depart", noun: "departure", sentence: "The ______ was delayed due to bad weather." },
      { root: "please", noun: "pleasure", sentence: "It's a ______ to meet you." },
      { root: "sign", noun: "signature", sentence: "Her ______ on the contract was required." },
      { root: "arrive", noun: "arrival", sentence: "We waited for their ______ at the station." },
      { root: "refuse", noun: "refusal", sentence: "His ______ to cooperate surprised everyone." },
      { root: "survive", noun: "survival", sentence: "His ______ in the mountains was remarkable." },
      { root: "approve", noun: "approval", sentence: "We need official ______ before we start." },
      { root: "warm", noun: "warmth", sentence: "Feel the ______ of the sun on your skin." },
      { root: "deep", noun: "depth", sentence: "The ______ of the lake is still unknown." },
      { root: "true", noun: "truth", sentence: "Tell me the ______ about what happened." },
      { root: "grow", noun: "growth", sentence: "We've seen rapid ______ in sales this year." },
      { root: "fly", noun: "flight", sentence: "The ______ from London takes three hours." },
      { root: "see", noun: "sight", sentence: "The mountains were a ______ to behold." },
      { root: "weigh", noun: "weight", sentence: "Please check the ______ of your luggage." },
      { root: "high", noun: "height", sentence: "The plane reached a ______ of ten thousand metres." },
      { root: "friend", noun: "friendship", sentence: "Their ______ goes back to school days." },
      { root: "member", noun: "membership", sentence: "Annual ______ fees are due in January." },
      { root: "champion", noun: "championship", sentence: "She won the world ______ three times." },
      { root: "partner", noun: "partnership", sentence: "They entered into a business ______." },
      { root: "short", noun: "shortage", sentence: "There is a ______ of skilled workers." },
      { root: "store", noun: "storage", sentence: "We need more ______ space in the garage." },
      { root: "pack", noun: "package", sentence: "Don't forget to check the ______ information." },
      { root: "marry", noun: "marriage", sentence: "Their ______ took place in June." },
      { root: "accurate", noun: "accuracy", sentence: "We need greater ______ in these reports." },
      { root: "efficient", noun: "efficiency", sentence: "The new system improved ______ a lot." },
      { root: "vacant", noun: "vacancy", sentence: "The ______ was advertised online." },
      { root: "frequent", noun: "frequency", sentence: "The ______ of trains has increased." }
    ];

    const ROUND = 8;
    const MAX_LIVES = 3;

    let roundItems = [];
    let index = 0;
    let lives = MAX_LIVES;

    const heartsEl = document.getElementById("hearts");
    const progressEl = document.getElementById("progress");
    const rootWordEl = document.getElementById("rootWord");
    const sentenceEl = document.getElementById("sentence");
    const answerEl = document.getElementById("answer");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const winOverlay = document.getElementById("winOverlay");
    const loseOverlay = document.getElementById("loseOverlay");
    const wrongRevealOverlay = document.getElementById("wrongRevealOverlay");
    const wrongRevealAnswer = document.getElementById("wrongRevealAnswer");
    const wrongRevealNext = document.getElementById("wrongRevealNext");
    const playAgain = document.getElementById("playAgain");
    const restartBtn = document.getElementById("restartBtn");
    const winMsg = document.getElementById("winMsg");

    [wrongRevealOverlay, winOverlay, loseOverlay].forEach(function (el) {
      document.body.appendChild(el);
    });

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRound() {
      return shuffle(BANK).slice(0, ROUND);
    }

    function norm(s) {
      return s.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function heartSvg(className) {
      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("class", className);
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      const path = document.createElementNS(ns, "path");
      path.setAttribute(
        "d",
        "M12 21s-6.5-4.35-9-8.5C.5 9.5 2 6 5.5 6c2 0 3.5 2 3.5 2S10.5 6 13 6c3.5 0 5 3.5 3.5 6.5C14 16.65 12 21 12 21z"
      );
      svg.appendChild(path);
      return svg;
    }

    function renderHearts() {
      heartsEl.innerHTML = "";
      for (let i = 0; i < MAX_LIVES; i++) {
        const h = heartSvg("heart " + (i < lives ? "on" : "off"));
        heartsEl.appendChild(h);
      }
    }

    function showItem() {
      const item = roundItems[index];
      rootWordEl.textContent = item.root;
      sentenceEl.textContent = item.sentence;
      answerEl.value = "";
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      progressEl.textContent = index + 1 + "/" + ROUND;
      answerEl.focus();
    }

    function startGameFresh() {
      roundItems = pickRound();
      index = 0;
      lives = MAX_LIVES;
      renderHearts();
      showItem();
      winOverlay.classList.remove("open");
      loseOverlay.classList.remove("open");
      closeWrongReveal();
      winMsg.textContent = "You finished this round — all " + ROUND + " words.";
    }

    function openWrongReveal(answerNoun) {
      wrongRevealAnswer.textContent = String(answerNoun);
      wrongRevealOverlay.removeAttribute("hidden");
      wrongRevealOverlay.classList.add("open");
      wrongRevealOverlay.style.display = "flex";
      wrongRevealOverlay.setAttribute("aria-hidden", "false");
      wrongRevealNext.focus();
    }

    function closeWrongReveal() {
      wrongRevealOverlay.classList.remove("open");
      wrongRevealOverlay.style.display = "none";
      wrongRevealOverlay.setAttribute("aria-hidden", "true");
    }

    function restartSameRound() {
      index = 0;
      lives = MAX_LIVES;
      renderHearts();
      showItem();
      loseOverlay.classList.remove("open");
      closeWrongReveal();
    }

    function advanceAfterWrong() {
      index += 1;
      if (index >= ROUND) {
        winOverlay.classList.add("open");
        return;
      }
      showItem();
    }

    function onCheck() {
      const raw = answerEl.value;
      if (!norm(raw)) {
        feedbackEl.textContent = "Type an answer first.";
        feedbackEl.className = "feedback bad";
        return;
      }

      const item = roundItems[index];
      const ok = norm(raw) === norm(item.noun);

      if (ok) {
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "feedback ok";
        index += 1;
        if (index >= ROUND) {
          winOverlay.classList.add("open");
          return;
        }
        setTimeout(function () {
          showItem();
        }, 450);
        return;
      }

      feedbackEl.textContent = "";
      answerEl.classList.add("shake");
      setTimeout(function () {
        answerEl.classList.remove("shake");
      }, 500);

      lives -= 1;
      renderHearts();
      openWrongReveal(item.noun);
    }

    wrongRevealNext.addEventListener("click", function () {
      closeWrongReveal();
      if (lives <= 0) {
        loseOverlay.classList.add("open");
        return;
      }
      advanceAfterWrong();
    });

    checkBtn.addEventListener("click", onCheck);
    answerEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        onCheck();
      }
    });

    restartBtn.addEventListener("click", function () {
      restartSameRound();
    });

    playAgain.addEventListener("click", function () {
      winOverlay.classList.remove("open");
      startGameFresh();
    });

    startGameFresh();
  </script>
</body>
</html>
